<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistente Sport Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: -apple-system, system-ui, sans-serif; }
        .apple-card { background: #1e293b; border-radius: 18px; padding: 18px; margin-bottom: 12px; }
        .input-dark { background: #334155; border: none; border-radius: 8px; color: white; padding: 5px 10px; width: 60px; text-align: center; }
        .btn-tool { background: #334155; padding: 8px; border-radius: 10px; font-size: 0.75rem; border: 1px solid transparent; }
        .btn-active { border-color: #3b82f6; background: #1e3a8a; }
        .timer-active { color: #f87171; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-xl font-bold">Entrenamiento Pro</h1>
            <p id="fecha-display" class="text-blue-400 text-xs font-mono"></p>
        </div>
        <div class="text-right">
            <span class="text-[10px] text-gray-400 block uppercase">Watch Ultra 3</span>
            <span class="text-green-400 font-bold">Conectado</span>
        </div>
    </div>

    <div class="apple-card">
        <label class="text-[10px] font-bold text-gray-400 uppercase mb-3 block text-center italic">Ubicación Actual</label>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="setModo('casa')" id="btn-casa" class="btn-tool btn-active">EN CASA (Gimnasio)</button>
            <button onclick="setModo('fuera')" id="btn-fuera" class="btn-tool">FUERA DE CASA</button>
        </div>
    </div>

    <div id="panel-herramientas" class="apple-card hidden border border-blue-500/30">
        <h3 class="text-xs font-bold mb-3">SELECCIONA HERRAMIENTAS DISPONIBLES:</h3>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="toggleTool(this)" class="btn-tool">Silla</button>
            <button onclick="toggleTool(this)" class="btn-tool">Cinta Elástica</button>
            <button onclick="toggleTool(this)" class="btn-tool">Peso Corporal</button>
            <button onclick="toggleTool(this)" class="btn-tool">Bici Prestada</button>
            <button onclick="toggleTool(this)" class="btn-tool">Mancuernas</button>
        </div>
    </div>

    <div class="apple-card text-center bg-slate-800/50">
        <p class="text-[10px] text-gray-400 uppercase">Temporizador de Descanso</p>
        <div id="timer-display" class="text-3xl font-mono py-1">01:30</div>
        <button onclick="startTimer()" class="text-xs bg-blue-600 px-4 py-1 rounded-full mt-1">Iniciar Descanso</button>
    </div>

    <div id="lista-ejercicios">
        </div>

    <script>
        let modoActual = 'casa';
        let herramientasFuera = [];

        const rutinas = {
            casa: [
                { nombre: "Press de Banca", equipo: "Barra de Pecho", reps: "3 x 10", ayuda: "Baja la barra al pecho suavemente. Codos a 45 grados." },
                { nombre: "Polea Alta Espalda", equipo: "Multiestación", reps: "3 x 12", ayuda: "Pecho fuera, lleva la barra a la parte alta del pecho." }
            ],
            fuera: [
                { nombre: "Flexiones de Brazos", equipo: "Peso Corporal", reps: "3 x Fallo técnico", ayuda: "Mantén el cuerpo como una tabla. Si es difícil, apoya rodillas." },
                { nombre: "Step-up (Subida)", equipo: "Silla", reps: "3 x 15 por pierna", ayuda: "Usa la fuerza de la pierna de arriba, no te impulses con la de abajo." }
            ]
        };

        function setModo(modo) {
            modoActual = modo;
            document.getElementById('btn-casa').classList.toggle('btn-active', modo === 'casa');
            document.getElementById('btn-fuera').classList.toggle('btn-active', modo === 'fuera');
            document.getElementById('panel-herramientas').classList.toggle('hidden', modo === 'casa');
            renderEjercicios();
        }

        function toggleTool(btn) {
            btn.classList.toggle('btn-active');
            renderEjercicios();
        }

        function renderEjercicios() {
            const container = document.getElementById('lista-ejercicios');
            container.innerHTML = '';
            const lista = rutinas[modoActual];

            lista.forEach((ej, index) => {
                container.innerHTML += `
                    <div class="apple-card">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-bold text-sm">${ej.nombre}</h4>
                                <p class="text-[10px] text-blue-400 italic">${ej.equipo}</p>
                            </div>
                            <button onclick="alert('${ej.ayuda}')" class="bg-slate-700 w-8 h-8 rounded-full text-xs italic">?</button>
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span>Objetivo: ${ej.reps}</span>
                            <div>
                                <input type="number" placeholder="Kg" class="input-dark" id="peso-${index}">
                                <button onclick="savePeso(${index})" class="ml-1 bg-green-600 px-2 py-1 rounded text-[10px]">OK</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function startTimer() {
            let timeLeft = 90;
            const display = document.getElementById('timer-display');
            display.classList.add('timer-active');
            
            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    display.classList.remove('timer-active');
                    display.innerText = "01:30";
                    alert("¡Descanso terminado! Próxima serie.");
                }
                timeLeft--;
            }, 1000);
        }

        function savePeso(id) {
            const peso = document.getElementById(`peso-${id}`).value;
            if(peso) alert(`Registrado: ${peso}kg. ¡Buen progreso!`);
        }

        // Inicializar fecha
        document.getElementById('fecha-display').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        renderEjercicios();
    </script>
</body>
</html>
