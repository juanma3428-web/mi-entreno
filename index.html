<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APPLE COACH V30 - Smart Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open { max-height: 1000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { background: rgba(0,0,0,0.95); display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="feedback-modal" class="modal-overlay">
        <div class="apple-card w-full border-apple-green/50">
            <h2 class="text-xl font-black italic uppercase mb-2 text-apple-green">Sesión Completada</h2>
            <p id="resumen-sesion" class="text-[10px] text-gray-400 uppercase font-bold mb-6 italic tracking-widest"></p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="saveFeedback(0.85)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic">Muy Ligero (Subir intensidad)</button>
                <button onclick="saveFeedback(1.0)" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase italic">Intensidad Óptima</button>
                <button onclick="saveFeedback(1.2)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic">Excesivo (Bajar carga)</button>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">APPLE COACH <span class="text-apple-green">V30</span></h1>
            <p class="text-[8px] text-gray-500 font-black uppercase tracking-[0.2em] italic">BM 450 Intelligence + Polar H10</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleDrawer('drawer-tanita')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-lg">⚖️</button>
            <button onclick="toggleDrawer('equip-drawer')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-lg">⚙️</button>
        </div>
    </div>

    <div id="mision-container" class="space-y-3 mb-8"></div>

    <div class="apple-card border-l-4 border-red-600 shadow-2xl shadow-red-900/10">
        <div class="flex justify-between items-start mb-4">
            <div>
                <div id="display" class="text-6xl timer-font italic">00:00</div>
                <div class="flex items-center gap-2 mt-1">
                    <span id="kcal-val" class="text-xl font-bold text-orange-500 tracking-tighter">0</span>
                    <p class="text-[8px] font-black text-gray-500 uppercase italic">Kcal Quemadas</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span id="bpm-val" class="text-4xl font-bold text-red-500 tracking-tighter leading-none">--</span>
                    <button onclick="connectPolar()" id="polar-btn" class="text-2xl hover:scale-110 transition-transform">❤️</button>
                </div>
                <p id="polar-status" class="text-[7px] font-black text-gray-500 uppercase tracking-tighter mt-1 italic">Polar Desconectada</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-start" class="bg-apple-green text-black p-5 rounded-2xl text-[11px] font-black uppercase flex-[2] italic transition-all active:scale-95">Iniciar Entrenamiento</button>
            <button onclick="pausarEntreno()" id="btn-pause" class="bg-white/5 text-white p-5 rounded-2xl text-[11px] font-black uppercase flex-1 border border-white/10 italic">Pausa</button>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4 italic tracking-widest">Composición Corporal (Tanita)</p>
            <div class="grid grid-cols-3 gap-2">
                <div class="space-y-1">
                    <label class="text-[7px] font-bold text-gray-500 uppercase ml-2">Peso (kg)</label>
                    <input type="number" id="tan-p" step="0.1" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 focus:border-apple-green outline-none" placeholder="0.0">
                </div>
                <div class="space-y-1">
                    <label class="text-[7px] font-bold text-gray-500 uppercase ml-2">% Grasa</label>
                    <input type="number" id="tan-g" step="0.1" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 focus:border-apple-green outline-none" placeholder="0.0">
                </div>
                <div class="space-y-1">
                    <label class="text-[7px] font-bold text-gray-500 uppercase ml-2">% Musc</label>
                    <input type="number" id="tan-m" step="0.1" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 focus:border-apple-green outline-none" placeholder="0.0">
                </div>
            </div>
            <button onclick="saveTanita()" class="w-full mt-4 bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase italic transition-colors active:bg-apple-green">Actualizar Perfil</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black mb-2 border border-white/5">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-3 italic tracking-widest">Inventario de Discos (BM 450)</p>
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <input type="number" id="dw" class="flex-1 bg-[#1c1c1e] p-4 rounded-xl text-xs border border-white/10 outline-none" placeholder="Peso (Kg)">
                    <input type="number" id="dq" class="flex-1 bg-[#1c1c1e] p-4 rounded-xl text-xs border border-white/10 outline-none" placeholder="Cant.">
                </div>
                <button onclick="addDisc()" class="w-full bg-white/10 text-white p-3 rounded-xl text-[10px] font-black uppercase italic border border-white/5">Registrar Discos</button>
            </div>
            <div id="lista-discos" class="flex flex-wrap gap-2 mt-4"></div>
        </div>

        <div class="apple-card bg-black">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-4 italic tracking-widest">Añadir Nueva Herramienta</p>
            <input type="text" id="tn" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2 border border-white/5 outline-none" placeholder="Nombre del Ejercicio">
            <div class="flex gap-2 mb-4">
                <select id="tt" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs text-gray-400 border border-white/5 outline-none">
                    <option value="bm450">BM 450 (Polea/Carga)</option>
                    <option value="calistenia">Calistenia (Bodyweight)</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="tw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs border border-white/5 outline-none" placeholder="Kg Base">
            </div>
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic transition-transform active:scale-95">Guardar en Memoria</button>
            <div id="lista-herramientas" class="mt-4 space-y-1"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN Y ESTADO
        const EJERCICIOS_MAESTROS = [
            { id: 'm1', n: 'Polea Alta (Espalda)', t: 'bm450', w: 15, active: true },
            { id: 'm2', n: 'Press Pecho Sentado', t: 'bm450', w: 20, active: true },
            { id: 'm3', n: 'Extension Cuadriceps', t: 'bm450', w: 10, active: true },
            { id: 'm4', n: 'Contractor Pecho', t: 'bm450', w: 10, active: true },
            { id: 'm5', n: 'Biceps Polea Baja', t: 'bm450', w: 5, active: true },
            { id: 'c1', n: 'Flexiones Diamante', t: 'calistenia', w: 0, active: true },
            { id: 'c2', n: 'Plancha Abdominal', t: 'calistenia', w: 0, active: true },
            { id: 'c3', n: 'Zancadas Dinámicas', t: 'calistenia', w: 0, active: true }
        ];

        let myTools = JSON.parse(localStorage.getItem('myToolsV30')) || EJERCICIOS_MAESTROS;
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 18, musculo: 38 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];
        let intensityFactor = parseFloat(localStorage.getItem('intensityFactor')) || 1.0;
        
        let seg=0, crono=null, running=false, pausado=false;
        let bluetoothDevice, heartRateCharacteristic, currentBPM = 0, totalKcal = 0;

        // --- CORE LÓGICA POLAR H10 ---
        async function connectPolar() {
            try {
                document.getElementById('polar-status').innerText = "Sincronizando...";
                bluetoothDevice = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                heartRateCharacteristic = await service.getCharacteristic('heart_rate_measurement');
                await heartRateCharacteristic.startNotifications();
                
                heartRateCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    currentBPM = e.target.value.getUint8(1);
                    document.getElementById('bpm-val').innerText = currentBPM;
                    document.getElementById('bpm-val').classList.add('pulse');
                });
                
                document.getElementById('polar-status').innerText = "H10 Conectada";
                document.getElementById('polar-status').classList.replace('text-gray-500', 'text-apple-green');
            } catch (error) { 
                console.log(error);
                document.getElementById('polar-status').innerText = "Error de enlace"; 
            }
        }

        function calculateKcal() {
            if (currentBPM > 40 && running && !pausado) {
                // Formula simplificada basada en peso y esfuerzo (BPM)
                let factor = (currentBPM * 0.07) + (parseFloat(bodyComp.peso) * 0.05) - 5;
                let kcalPorMinuto = Math.max(0, factor / 10);
                totalKcal += kcalPorMinuto / 30; // Ejecución cada 2 seg
                document.getElementById('kcal-val').innerText = Math.round(totalKcal);
            }
        }

        // --- CORE LÓGICA ENTRENAMIENTO ---
        function getCapacidadMaxima() { 
            return myDiscs.reduce((acc, d) => acc + (parseFloat(d.w) * parseInt(d.q)), 0); 
        }

        function calcularPlan(tool) {
            const maxFisico = getCapacidadMaxima();
            let repsExtra = 0, pesoFinal = tool.w;

            if (tool.t === 'bm450' || tool.t === 'fuerza') {
                if (tool.w > maxFisico && maxFisico > 0) {
                    pesoFinal = maxFisico;
                    // Compensación: Por cada 2kg que falten, +1 repetición
                    repsExtra = Math.ceil((tool.w - maxFisico) / 2);
                }
                let baseReps = 10;
                let final = Math.round((baseReps + repsExtra) * intensityFactor);
                return { reps: `${final} Reps`, carga: `${pesoFinal} kg` };
            }
            
            if (tool.t === 'calistenia') {
                let base = 12 + (parseFloat(bodyComp.musculo) / 5) - (parseFloat(bodyComp.grasa) / 4);
                let final = Math.round(base * intensityFactor);
                return { reps: `${final} Reps`, carga: "Cuerpo" };
            }
            
            return { reps: "15-20 Min", carga: "Cardio" };
        }

        function generarMision() {
            const cont = document.getElementById('mision-container');
            let pool = myTools.filter(t => t.active !== false);
            if (pool.length === 0) {
                cont.innerHTML = `<p class="text-[9px] text-center text-gray-600 uppercase italic py-10">Sin herramientas activas</p>`;
                return;
            }

            // Seleccionamos 3 ejercicios aleatorios priorizando variedad
            let seleccion = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
            let html = '';
            
            seleccion.forEach(t => {
                const plan = calcularPlan(t);
                const color = t.t === 'calistenia' ? 'border-blue-500' : (t.t === 'cardio' ? 'border-orange-500' : 'border-apple-green');
                const badge = t.t === 'bm450' ? 'BM 450' : (t.t === 'calistenia' ? 'BODY' : 'EXTRA');
                
                html += `
                    <div class="apple-card border-l-4 ${color} py-5 flex justify-between items-center bg-gradient-to-r from-white/[0.03] to-transparent">
                        <div>
                            <span class="text-[7px] bg-white/10 px-2 py-0.5 rounded-full font-black text-gray-400 mb-2 inline-block tracking-tighter">${badge}</span>
                            <h3 class="font-black text-sm uppercase italic text-white leading-tight">${t.n}</h3>
                            <p class="text-[9px] text-gray-500 font-bold uppercase mt-1 italic tracking-tighter">${plan.carga}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black italic text-apple-green leading-none">${plan.reps}</p>
                            <p class="text-[7px] text-gray-600 font-bold uppercase mt-1">Objetivo</p>
                        </div>
                    </div>`;
            });
            cont.innerHTML = html;
        }

        // --- INTERFAZ Y EVENTOS ---
        function toggleEntreno() {
            if(!running) {
                running = true; pausado = false; seg = 0; totalKcal = 0;
                document.getElementById('btn-start').innerText = "FINALIZAR";
                document.getElementById('btn-start').classList.replace('bg-apple-green', 'bg-red-600');
                document.getElementById('btn-start').classList.add('text-white');
                crono = setInterval(() => { 
                    if(!pausado) { 
                        seg++; updateDisp(); 
                        if(seg % 2 === 0) calculateKcal(); 
                    } 
                }, 1000);
            } else {
                clearInterval(crono);
                document.getElementById('resumen-sesion').innerText = `HAS COMPLETADO ${Math.floor(seg/60)} MINUTOS • ${Math.round(totalKcal)} KCAL`;
                document.getElementById('feedback-modal').style.display = 'flex';
            }
        }

        function pausarEntreno() {
            if(!running) return;
            pausado = !pausado;
            document.getElementById('btn-pause').innerText = pausado ? "REANUDAR" : "PAUSA";
            document.getElementById('btn-pause').classList.toggle('bg-apple-green');
            document.getElementById('btn-pause').classList.toggle('text-black');
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function toggleDrawer(id) { 
            const d = document.getElementById(id);
            const isOpen = d.classList.contains('drawer-open');
            document.querySelectorAll('.drawer').forEach(el => el.classList.remove('drawer-open'));
            if(!isOpen) d.classList.add('drawer-open');
        }

        function addDisc() {
            const w = parseFloat(document.getElementById('dw').value);
            const q = parseInt(document.getElementById('dq').value);
            if(w > 0 && q > 0) {
                myDiscs.push({w, q});
                localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs));
                document.getElementById('dw').value = ''; document.getElementById('dq').value = '';
                renderDiscs(); generarMision();
            }
        }

        function renderDiscs() {
            const cont = document.getElementById('lista-discos');
            cont.innerHTML = '';
            myDiscs.forEach((d, i) => { 
                cont.innerHTML += `<div class="bg-white/5 border border-white/10 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex gap-2 items-center text-white italic">${d.q}x ${d.w}kg <button onclick="removeDisc(${i})" class="text-red-500 font-bold ml-1">✕</button></div>`; 
            });
        }

        function removeDisc(i) {
            myDiscs.splice(i, 1);
            localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs));
            renderDiscs(); generarMision();
        }

        function addTool() {
            const n = document.getElementById('tn').value;
            const t = document.getElementById('tt').value;
            const w = parseFloat(document.getElementById('tw').value) || 0;
            if(n) {
                myTools.push({id: Date.now(), n, t, w, active: true});
                localStorage.setItem('myToolsV30', JSON.stringify(myTools));
                document.getElementById('tn').value = '';
                renderTools(); generarMision();
            }
        }

        function renderTools() {
            const cont = document.getElementById('lista-herramientas');
            cont.innerHTML = '';
            myTools.forEach((t, idx) => {
                cont.innerHTML += `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl mb-1 border border-white/5">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${t.active?'checked':''} onchange="toggleStatus(${idx})" class="accent-apple-green w-4 h-4">
                        <span class="text-[10px] font-bold uppercase italic text-white">${t.n}</span>
                    </div>
                    <button onclick="deleteTool(${idx})" class="text-red-500 text-xs px-2">✕</button>
                </div>`;
            });
        }

        function toggleStatus(idx) {
            myTools[idx].active = !myTools[idx].active;
            localStorage.setItem('myToolsV30', JSON.stringify(myTools));
            generarMision();
        }

        function deleteTool(idx) {
            myTools.splice(idx, 1);
            localStorage.setItem('myToolsV30', JSON.stringify(myTools));
            renderTools(); generarMision();
        }

        function saveTanita() {
            bodyComp.peso = document.getElementById('tan-p').value || bodyComp.peso;
            bodyComp.grasa = document.getElementById('tan-g').value || bodyComp.grasa;
            bodyComp.musculo = document.getElementById('tan-m').value || bodyComp.musculo;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            toggleDrawer('drawer-tanita');
            generarMision();
        }

        function saveFeedback(factor) {
            localStorage.setItem('intensityFactor', factor);
            history.push({ date: new Date().toISOString(), kcal: totalKcal, time: seg });
            localStorage.setItem('trainingHistory', JSON.stringify(history));
            location.reload();
        }

        window.onload = () => { 
            document.getElementById('tan-p').value = bodyComp.peso;
            document.getElementById('tan-g').value = bodyComp.grasa;
            document.getElementById('tan-m').value = bodyComp.musculo;
            renderDiscs(); 
            renderTools(); 
            generarMision(); 
        };
    </script>
</body>
</html>
