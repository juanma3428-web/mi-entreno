<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Tanita Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 2000px; }
        .chip-container { display: flex; align-items: center; background: #2c2c2e; border-radius: 12px; overflow: hidden; margin-bottom: 6px; border: 1px solid transparent; }
        .chip-container.active { border-color: #30d158; }
        .chip-label { flex: 1; padding: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .chip-container.active .chip-label { background: #30d158; color: #000; }
        .btn-del { padding: 12px; color: #ff3b30; font-weight: bold; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .input-tanita { bg-black; border-white/10; border; rounded-xl; p-3; text-center; text-sm; font-bold; width: 100%; color: white; background: #000; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Análisis Tanita BC-730 Activo</p>
        </div>
        <button onclick="document.getElementById('modal-tanita').classList.add('active')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-lg">⚖️</button>
    </div>

    <div id="modal-tanita" class="modal-overlay">
        <div class="w-[90%] max-w-xs bg-[#1c1c1e] p-6 rounded-3xl border border-white/10">
            <h3 class="text-center text-[10px] font-black text-apple-green uppercase mb-6 italic tracking-widest">Datos Tanita BC-730</h3>
            <div class="space-y-4">
                <div><label class="text-[8px] text-gray-500 font-bold uppercase ml-2">Peso Corporal (kg)</label><input type="number" id="tanita-peso" class="input-tanita" step="0.1" placeholder="00.0"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase ml-2">% Grasa</label><input type="number" id="tanita-grasa" class="input-tanita" step="0.1" placeholder="%"></div>
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase ml-2">% Agua</label><input type="number" id="tanita-agua" class="input-tanita" step="0.1" placeholder="%"></div>
                </div>
                <div><label class="text-[8px] text-gray-500 font-bold uppercase ml-2">Masa Muscular (kg)</label><input type="number" id="tanita-musculo" class="input-tanita" step="0.1" placeholder="00.0"></div>
            </div>
            <div class="flex gap-2 mt-8">
                <button onclick="document.getElementById('modal-tanita').classList.remove('active')" class="flex-1 py-3 text-xs font-bold text-gray-500">CERRAR</button>
                <button onclick="guardarTanita()" class="flex-1 py-3 bg-apple-green text-black rounded-xl text-xs font-black uppercase">Sincronizar</button>
            </div>
        </div>
    </div>

    <div id="modal-feedback" class="modal-overlay">
        <div class="w-[90%] max-w-sm text-center">
            <h2 class="text-2xl font-black mb-2 italic">¿Cómo fue el esfuerzo?</h2>
            <button onclick="procesarFeedback(-4)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-red-600/20 text-red-500 border border-red-500/30">🥵 AGOTADOR (-4kg)</button>
            <button onclick="procesarFeedback(-2)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-orange-600/20 text-orange-500 border border-orange-500/30">🔥 DURO (-2kg)</button>
            <button onclick="procesarFeedback(0)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-blue-600/20 text-blue-400 border border-blue-500/30">👍 NORMAL (Mantener)</button>
            <button onclick="procesarFeedback(2)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-green-600/20 text-apple-green border border-apple-green/30">✨ SUAVE (+2kg)</button>
        </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-start mb-4">
            <div>
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Polar H10 Live</p>
                <div class="flex items-baseline gap-1">
                    <span id="bpm-val" class="text-6xl font-bold tracking-tighter">--</span>
                    <span class="text-red-500 font-bold text-sm italic">BPM</span>
                </div>
            </div>
            <button id="btn-polar" onclick="conectarPolar()" class="w-12 h-12 rounded-full bg-red-600/10 flex items-center justify-center text-xl">❤️</button>
        </div>
        <div class="flex justify-between font-bold border-t border-white/5 pt-4">
            <div id="kcal-val" class="text-2xl text-orange-500">0 <span class="text-xs uppercase">KCAL</span></div>
            <div id="session-time" class="text-2xl tracking-tighter italic font-light">0:00</div>
        </div>
    </div>

    <div class="apple-card text-center">
        <div id="display" class="text-7xl timer-font mb-8 italic">00:00</div>
        <div class="flex gap-4">
            <button id="btn-pausa" onclick="pausar()" class="w-16 h-16 rounded-full bg-yellow-500/10 flex items-center justify-center opacity-20" disabled>
                <span id="pause-icon" class="text-yellow-500 text-xl font-bold">||</span>
            </button>
            <button id="btn-principal" onclick="toggleEntreno()" class="flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase tracking-widest italic">Iniciar Sesión</button>
        </div>
    </div>

    <div class="apple-card">
        <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-full flex justify-between items-center">
            <span class="text-[10px] font-black text-gray-500 uppercase italic tracking-tight italic">Configuración Gimnasio</span>
            <span class="text-apple-green text-xs font-bold italic">Config</span>
        </button>
        <div id="equip-drawer" class="drawer">
            <div class="mt-4 p-4 bg-white/5 rounded-2xl mb-4 border border-white/5">
                <input type="number" id="disc-weight" class="bg-black border border-white/10 rounded-xl p-3 text-xs w-full mb-2" placeholder="Peso Disco (kg)">
                <input type="number" id="disc-qty" class="bg-black border border-white/10 rounded-xl p-3 text-xs w-full mb-2" placeholder="Cantidad">
                <button onclick="addDiscs()" class="w-full bg-white/10 text-white py-2 rounded-xl font-black text-[10px] uppercase mb-5">Añadir Discos</button>
                <hr class="border-white/5 mb-5">
                <input type="text" id="new-tool-name" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs mb-2" placeholder="Ejercicio">
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select id="new-tool-type" class="bg-black border border-white/10 rounded-xl p-3 text-xs text-gray-400">
                        <option value="fuerza">Fuerza</option>
                        <option value="cardio">Cardio</option>
                    </select>
                    <input type="number" id="new-tool-weight" class="bg-black border border-white/10 rounded-xl p-3 text-xs" placeholder="Peso Base">
                </div>
                <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Añadir Ejercicio</button>
            </div>
            <div id="lista-discos" class="mb-4"></div>
            <div id="lista-equip"></div>
        </div>
    </div>

    <div class="px-2 mb-4">
        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Sugerencia Tanita-Pro</h2>
        <p id="coach-reason" class="text-[11px] text-apple-green italic mt-1 font-medium"></p>
    </div>
    <div id="contenedor-rutina" class="space-y-3"></div>

    <script>
        let seg=0, crono = null, running=false, paused=false, kcal=0;
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [
            {id: 1, n: "Press Banca (BM490)", t: "fuerza", w: 20},
            {id: 2, n: "Jalón Pecho (Polea)", t: "fuerza", w: 25},
            {id: 4, n: "Rodillo (Ciclismo)", t: "cardio", w: 0}
        ];
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let globalWeightAdjust = parseFloat(localStorage.getItem('globalWeightAdjust')) || 0;
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75.0, grasa: 20.0, agua: 55.0, musculo: 35.0 };

        function init() { 
            document.getElementById('tanita-peso').value = bodyComp.peso;
            document.getElementById('tanita-grasa').value = bodyComp.grasa;
            document.getElementById('tanita-agua').value = bodyComp.agua;
            document.getElementById('tanita-musculo').value = bodyComp.musculo;
            renderTools(); 
            renderDiscs(); 
            generarRutinaProfesional(); 
        }

        function guardarTanita() {
            bodyComp.peso = parseFloat(document.getElementById('tanita-peso').value);
            bodyComp.grasa = parseFloat(document.getElementById('tanita-grasa').value);
            bodyComp.agua = parseFloat(document.getElementById('tanita-agua').value);
            bodyComp.musculo = parseFloat(document.getElementById('tanita-musculo').value);
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            document.getElementById('modal-tanita').classList.remove('active');
            generarRutinaProfesional();
        }

        function generarRutinaProfesional() {
            const cont = document.getElementById('contenedor-rutina');
            cont.innerHTML = '';
            const activas = myTools.filter(t => localStorage.getItem('e_'+t.n) === 'true');
            if(activas.length === 0) return;

            const ultimaSesion = localStorage.getItem('tipo_ultima_sesion');
            let tipoHoy = (ultimaSesion === 'fuerza') ? 'cardio' : 'fuerza';
            
            // Lógica de Adaptación Basada en Memoria Tanita
            let reasonText = "";
            let repsSugeridas = "10-12"; 
            let minCardio = 40;

            if(bodyComp.musculo < 32) {
                repsSugeridas = "8-10 (Hipertrofia)";
                reasonText = "Prioridad: Construcción muscular.";
            } else {
                repsSugeridas = "12-15 (Resistencia)";
                reasonText = "Prioridad: Calidad y densidad.";
            }

            if(bodyComp.grasa > 22) {
                minCardio = 50;
                reasonText += " Grasa elevada: Sesión extendida.";
            }

            document.getElementById('coach-reason').innerText = reasonText;

            activas.filter(t => t.t === tipoHoy).slice(0, 3).forEach(tool => {
                let sugerenciaCarga = "";
                let sugerenciaReps = "";

                if(tool.t === 'fuerza') {
                    const pesoIdeal = Math.max(0, tool.w + globalWeightAdjust);
                    const calc = calcularCombinacion(pesoIdeal);
                    sugerenciaCarga = `Carga: ${calc.real}kg | Discos: ${calc.texto || 'Base'}`;
                    sugerenciaReps = `Objetivo: 4 Series x ${repsSugeridas}`;
                } else {
                    sugerenciaCarga = `Duración: ${minCardio} minutos`;
                    sugerenciaReps = `Zona 2: 125-135 BPM aprox.`;
                }

                cont.innerHTML += `
                    <div class="apple-card border-l-2 border-apple-green flex justify-between items-center py-5">
                        <div class="flex-1">
                            <h3 class="font-black text-xs uppercase italic tracking-tight">${tool.n}</h3>
                            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">${sugerenciaCarga}</p>
                            <p class="text-[9px] text-apple-green font-black uppercase mt-1 tracking-tighter">${sugerenciaReps}</p>
                        </div>
                        <button onclick="completarEj('${tool.t}')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-black text-[10px] text-apple-green">LOG</button>
                    </div>`;
            });
        }

        function calcularCombinacion(pesoObjetivo) {
            let restante = pesoObjetivo;
            let combinacion = [];
            const discosSorted = [...myDiscs].sort((a,b) => b.w - a.w);
            discosSorted.forEach(d => {
                let usar = Math.min(d.q, Math.floor(restante / d.w));
                if (usar > 0) {
                    combinacion.push(`${usar}x${d.w}kg`);
                    restante -= (usar * d.w);
                }
            });
            return { real: pesoObjetivo - restante, texto: combinacion.join(' + ') };
        }

        // CONTROL SESIÓN
        function toggleEntreno() {
            if (!running) {
                running = true; paused = false;
                document.getElementById('btn-principal').innerText = "FINALIZAR SESIÓN";
                document.getElementById('btn-principal').className = "flex-1 bg-red-600 text-white rounded-2xl font-black text-sm uppercase italic";
                document.getElementById('btn-pausa').disabled = false; document.getElementById('btn-pausa').classList.remove('opacity-20');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                clearInterval(crono); crono = null;
                document.getElementById('modal-feedback').classList.add('active');
            }
        }

        function pausar() {
            const icon = document.getElementById('pause-icon');
            if (!paused) { paused = true; clearInterval(crono); icon.innerText = "▶"; }
            else { paused = false; icon.innerText = "||"; crono = setInterval(() => { seg++; updateDisp(); }, 1000); }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            const t = `${m}:${s.toString().padStart(2,'0')}`;
            document.getElementById('display').innerText = t;
            document.getElementById('session-time').innerText = t;
        }

        function procesarFeedback(kg) {
            globalWeightAdjust += kg;
            localStorage.setItem('globalWeightAdjust', globalWeightAdjust);
            running = false; seg = 0; updateDisp();
            document.getElementById('modal-feedback').classList.remove('active');
            document.getElementById('btn-principal').innerText = "INICIAR SESIÓN";
            document.getElementById('btn-principal').className = "flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase tracking-widest italic";
            document.getElementById('btn-pausa').disabled = true; document.getElementById('btn-pausa').classList.add('opacity-20');
            generarRutinaProfesional();
        }

        // BLUETOOTH POLAR H10
        async function conectarPolar() {
            const btn = document.getElementById('btn-polar');
            try {
                const device = await navigator.bluetooth.requestDevice({ 
                    filters: [{ services: ['heart_rate'] }],
                    optionalServices: ['battery_service']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                await char.startNotifications();
                btn.style.background = "#30d15833";
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value;
                    const bpm = val.getUint8(1);
                    document.getElementById('bpm-val').innerText = bpm;
                    kcal += (bpm * (bodyComp.peso * 0.0001));
                    document.getElementById('kcal-val').innerHTML = `${Math.floor(kcal)} <span class="text-xs uppercase">KCAL</span>`;
                });
            } catch (e) { console.log(e); }
        }

        // AUX RENDER
        function renderTools() {
            const cont = document.getElementById('lista-equip'); cont.innerHTML = '';
            myTools.forEach(tool => {
                const act = localStorage.getItem('e_'+tool.n) === 'true';
                cont.innerHTML += `<div class="chip-container ${act?'active':''}">
                    <div class="chip-label" onclick="toggleTool('${tool.n}')">${tool.n}</div>
                    <button onclick="deleteTool(${tool.id})" class="btn-del text-xs">✕</button></div>`;
            });
        }
        function toggleTool(name) { localStorage.setItem('e_'+name, localStorage.getItem('e_'+name) !== 'true'); init(); }
        function deleteTool(id) { myTools = myTools.filter(t => t.id !== id); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); init(); }
        function completarEj(tipo) { localStorage.setItem('tipo_ultima_sesion', tipo); generarRutinaProfesional(); }
        function addDiscs() {
            const w = parseFloat(document.getElementById('disc-weight').value);
            const q = parseInt(document.getElementById('disc-qty').value);
            if(w && q) { myDiscs.push({w,q}); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); renderDiscs(); generarRutinaProfesional(); }
        }
        function renderDiscs() {
            const cont = document.getElementById('lista-discos'); cont.innerHTML = '';
            myDiscs.forEach((d, i) => { cont.innerHTML += `<span class="inline-block bg-white/10 px-2 py-1 rounded-md text-[9px] font-bold mr-1 mb-1">${d.q}x${d.w}kg <button onclick="removeDisc(${i})" class="text-red-500 ml-1">✕</button></span>`; });
        }
        function removeDisc(i) { myDiscs.splice(i, 1); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); renderDiscs(); generarRutinaProfesional(); }
        function addTool() {
            const n = document.getElementById('new-tool-name').value;
            const t = document.getElementById('new-tool-type').value;
            const w = parseFloat(document.getElementById('new-tool-weight').value || 0);
            if(n) { myTools.push({id: Date.now(), n, t, w}); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); localStorage.setItem('e_'+n, 'true'); renderTools(); generarRutinaProfesional(); }
        }

        init();
    </script>
</body>
</html>
