<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sport Ultra Pro + Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 12px; }
        .modo-serie { background: #7f1d1d; border: 2px solid #ef4444; }
        .modo-descanso { background: #064e3b; border: 2px solid #10b981; }
        .bpm-display { font-size: 3rem; font-weight: 800; font-family: monospace; }
        .stat-box { background: #0f172a; padding: 10px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body class="p-5 pb-28">

    <div id="health-summary" class="apple-card border-t-4 border-pink-500">
        <h2 class="text-[10px] font-black uppercase text-pink-400 mb-3 tracking-widest">Sincronización Apple Health</h2>
        <div class="grid grid-cols-3 gap-2">
            <div class="stat-box">
                <p class="text-[9px] text-gray-400 uppercase">BPM Med.</p>
                <p id="avg-bpm" class="text-lg font-bold">--</p>
            </div>
            <div class="stat-box">
                <p class="text-[9px] text-gray-400 uppercase">Kcal</p>
                <p id="total-kcal" class="text-lg font-bold">--</p>
            </div>
            <div class="stat-box">
                <p class="text-[9px] text-gray-400 uppercase">Tiempo</p>
                <p id="total-time" class="text-lg font-bold">--</p>
            </div>
        </div>
        <button onclick="sincronizarSalud()" class="w-full mt-3 py-2 bg-pink-600/20 text-pink-400 text-[10px] font-bold rounded-lg border border-pink-500/30">ACTUALIZAR DATOS DESDE WATCH</button>
    </div>

    <div id="timer-card" class="apple-card text-center transition-all duration-500">
        <div id="display" class="text-6xl font-mono font-bold mb-4 tracking-tighter">00:00</div>
        <div class="grid grid-cols-2 gap-3">
            <button id="btn-principal" onclick="toggleFase()" class="bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase">Iniciar Serie</button>
            <button id="btn-pausa" onclick="pausar()" class="bg-slate-800 py-3 rounded-xl font-bold text-xs uppercase opacity-30" disabled>Pausa</button>
        </div>
    </div>

    <div id="contenedor-ejercicios"></div>

    <script>
        let segundos = 0, crono, estado = 'parado', modo = 'casa';

        // FUNCIÓN DE CONEXIÓN CON APPLE HEALTH
        async function sincronizarSalud() {
            // Nota: En una PWA, Safari requiere que el usuario haya iniciado un entreno en el Watch.
            // Esta función simula la llamada a la API de HealthKit.
            alert("Solicitando acceso a Apple Health...");
            
            // Simulación de datos que recibiremos del Apple Watch Ultra 3:
            document.getElementById('avg-bpm').innerText = "124";
            document.getElementById('total-kcal').innerText = "342";
            document.getElementById('total-time').innerText = "42m";
            
            // Guardar en el historial de la App
            localStorage.setItem('ultimo_entreno', JSON.stringify({
                bpm: 124, kcal: 342, fecha: new Date().toLocaleDateString()
            }));
        }

        function toggleFase() {
            const btn = document.getElementById('btn-principal'), card = document.getElementById('timer-card'), btnP = document.getElementById('btn-pausa');
            btnP.disabled = false; btnP.classList.remove('opacity-30');

            if (estado !== 'serie') {
                estado = 'serie'; segundos = 0;
                card.className = "apple-card text-center modo-serie";
                btn.innerText = "FINALIZAR SERIE";
                clearInterval(crono);
                crono = setInterval(() => { segundos++; actDisplay(); }, 1000);
            } else {
                estado = 'descanso'; segundos = 90;
                card.className = "apple-card text-center modo-descanso";
                btn.innerText = "SALTAR DESCANSO";
                clearInterval(crono);
                crono = setInterval(() => { 
                    segundos--; actDisplay(); 
                    if(segundos <= 0) { resetCrono(); }
                }, 1000);
            }
        }

        function actDisplay() {
            let m = Math.floor(segundos / 60), s = segundos % 60;
            document.getElementById('display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function pausar() {
            if (estado === 'pausa') {
                estado = 'serie'; crono = setInterval(() => { segundos++; actDisplay(); }, 1000);
                document.getElementById('btn-pausa').innerText = "PAUSA";
            } else {
                clearInterval(crono); estado = 'pausa';
                document.getElementById('btn-pausa').innerText = "REANUDAR";
            }
        }

        function resetCrono() {
            clearInterval(crono); estado = 'parado'; segundos = 0; actDisplay();
            document.getElementById('timer-card').className = "apple-card text-center";
            document.getElementById('btn-principal').innerText = "INICIAR SERIE";
        }

        function render() {
            const cont = document.getElementById('contenedor-ejercicios');
            cont.innerHTML = '';
            const ejs = [{n:"Press Banca", eq:"Barra", r:"4x10"}, {n:"Polea Alta", eq:"Multiestación", r:"3x12"}, {n:"Rodillo", eq:"Bici", r:"15 min"}];
            ejs.forEach((e, i) => {
                cont.innerHTML += `
                    <div class="apple-card py-4 bg-slate-900/50 flex justify-between items-center">
                        <div><h3 class="font-bold text-sm uppercase">${e.n}</h3><p class="text-[9px] text-blue-400 italic">${e.eq}</p></div>
                        <div class="flex gap-2">
                            <input type="number" id="kg-${i}" class="bg-slate-800 text-white rounded w-12 text-center text-xs p-1" placeholder="Kg" onchange="localStorage.setItem('kg-${i}', this.value)">
                            <button class="bg-green-700/50 text-green-400 px-2 rounded font-bold text-[10px]">OK</button>
                        </div>
                    </div>`;
                setTimeout(() => {
                    const s = localStorage.getItem(`kg-${i}`);
                    if(s) document.getElementById(`kg-${i}`).value = s;
                }, 10);
            });
        }
        render(); actDisplay();
    </script>
</body>
</html>
