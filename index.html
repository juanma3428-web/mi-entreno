<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entreno - Apple Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Estilo Anillos de Apple */
        .ring-card { background: #1c1c1e; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        
        /* Colores Apple Fitness */
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .text-apple-red { color: #ff3b30; }
        .text-apple-yellow { color: #ffd60a; }
        
        /* Animación de latido real */
        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .heart-pulse { animation: heartbeat 0.8s infinite; }

        /* Estilo de los botones redondos de Apple */
        .apple-btn { border-radius: 12px; font-weight: 600; transition: all 0.2s; border: none; }
        .apple-btn:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Desplegable oculto */
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .drawer-open { max-height: 1000px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="ring-card border-l-4 border-red-500">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-tight">Frecuencia Cardíaca</p>
                <div class="flex items-baseline gap-1">
                    <span id="bpm-val" class="text-5xl font-bold tracking-tighter">--</span>
                    <span class="text-apple-red font-bold text-sm">BPM</span>
                </div>
            </div>
            <button onclick="conectarPolar()" id="heart-icon" class="text-2xl">❤️</button>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-white/10">
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Calorías</p>
                <p class="text-xl font-bold"><span id="kcal-val">0</span> <span class="text-xs text-orange-500 font-medium">KCAL</span></p>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Tiempo Total</p>
                <p id="total-session-time" class="text-xl font-bold">0:00</p>
            </div>
        </div>
    </div>

    <div class="ring-card">
        <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-full flex justify-between items-center">
            <span class="text-sm font-bold">Configurar mi gimnasio</span>
            <span class="text-apple-green text-xs">Editar</span>
        </button>
        <div id="equip-drawer" class="drawer">
            <div id="equip-list" class="grid grid-cols-2 gap-2 mt-4">
                </div>
        </div>
    </div>

    <div id="timer-bg" class="ring-card text-center transition-colors duration-500">
        <p id="timer-status" class="text-[10px] font-black uppercase text-gray-500 mb-1 tracking-widest">Listo</p>
        <div id="timer-display" class="text-7xl font-light tracking-tighter mb-6">00:00</div>
        
        <div class="flex gap-3">
            <button id="pause-btn" onclick="pausar()" class="w-16 h-16 rounded-full bg-apple-yellow/20 flex items-center justify-center opacity-30" disabled>
                <span id="pause-icon" class="text-apple-yellow text-xl">||</span>
            </button>
            
            <button id="main-btn" onclick="toggleEntreno()" class="flex-1 apple-btn bg-apple-green text-black text-sm uppercase tracking-widest font-black">
                Iniciar
            </button>
        </div>
    </div>

    <div id="coach-section">
        <h2 class="text-sm font-bold text-gray-500 ml-2 mb-3 uppercase tracking-widest">Siguiente Ejercicio</h2>
        <div id="exercises-cont"></div>
    </div>

    <script>
        let seg = 0, crono, running = false, paused = false;
        const eqList = ["Multiestación", "Rodillo de rulos", "Bici carretera", "Mancuernas", "Silla", "Esterilla", "Barra olímpica"].sort();
        
        const db = [
            {n: "Press de Banca", eq: "Multiestación", t: "Empuja desde el pecho.", link: "https://www.youtube.com/results?search_query=tecnica+press+banca"},
            {n: "Polea Alta", eq: "Multiestación", t: "Codos abajo y espalda recta.", link: "https://www.youtube.com/results?search_query=polea+alta+tecnica"},
            {n: "Rodillo", eq: "Rodillo de rulos", t: "Mantén cadencia fluida.", link: "https://www.youtube.com/results?search_query=entrenamiento+rodillo"}
        ];

        function init() {
            const cont = document.getElementById('equip-list');
            eqList.forEach(e => {
                const act = localStorage.getItem('e_'+e) === 'true';
                cont.innerHTML += `<button onclick="toggleEq('${e}')" class="p-3 rounded-xl text-[10px] font-bold ${act?'bg-apple-green text-black':'bg-white/5 text-gray-400'}">${e.toUpperCase()}</button>`;
            });
            renderCoach();
        }

        function toggleEq(e) {
            const val = localStorage.getItem('e_'+e) === 'true';
            localStorage.setItem('e_'+e, !val);
            location.reload();
        }

        function renderCoach() {
            const cont = document.getElementById('exercises-cont');
            const filtered = db.filter(ex => localStorage.getItem('e_'+ex.eq) === 'true');
            
            if(filtered.length === 0) {
                cont.innerHTML = '<p class="text-xs text-gray-500 p-4 italic">Selecciona qué herramientas tienes hoy para empezar el entreno.</p>';
                return;
            }

            filtered.forEach((ex, i) => {
                cont.innerHTML += `
                    <div class="ring-card border-l-2 border-apple-green">
                        <div class="flex justify-between items-start">
                            <div onclick="window.open('${ex.link}')">
                                <h3 class="font-bold text-lg">${ex.n} <span class="text-apple-green text-xs">ⓘ</span></h3>
                                <p class="text-xs text-gray-500">${ex.t}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="number" id="kg-${i}" class="w-12 bg-white/10 rounded-lg p-2 text-center text-sm font-bold" placeholder="Kg">
                                <button onclick="nextStep(${i})" class="bg-white text-black p-2 rounded-lg font-bold text-xs uppercase">OK</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // BLUETOOTH POLAR NATIVO
        async function conectarPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const bpm = e.target.value.getUint8(1);
                    document.getElementById('bpm-val').innerText = bpm;
                    document.getElementById('heart-icon').classList.add('heart-pulse');
                    document.getElementById('kcal-val').innerText = Math.floor(seg * 0.12); // Estimación
                });
            } catch (e) { console.log("Bluetooth cancelado"); }
        }

        // LÓGICA DE ENTRENADOR (CRONO)
        function toggleEntreno() {
            const mainBtn = document.getElementById('main-btn');
            const pBtn = document.getElementById('pause-btn');
            
            if (!running) {
                running = true; paused = false;
                mainBtn.innerText = "Finalizar";
                mainBtn.className = "flex-1 apple-btn bg-red-500 text-white text-sm uppercase font-black";
                pBtn.disabled = false; pBtn.classList.remove('opacity-30');
                document.getElementById('timer-status').innerText = "En Serie";
                crono = setInterval(() => { seg++; updateDisplay(); }, 1000);
            } else {
                running = false;
                clearInterval(crono);
                mainBtn.innerText = "Iniciar";
                mainBtn.className = "flex-1 apple-btn bg-apple-green text-black text-sm uppercase font-black";
                pBtn.disabled = true; pBtn.classList.add('opacity-30');
                document.getElementById('timer-status').innerText = "Listo";
            }
        }

        function pausar() {
            const pBtn = document.getElementById('pause-btn');
            const icon = document.getElementById('pause-icon');
            if (!paused) {
                paused = true;
                clearInterval(crono);
                icon.innerText = "▶";
                document.getElementById('timer-status').innerText = "Pausa";
            } else {
                paused = false;
                icon.innerText = "||";
                document.getElementById('timer-status').innerText = "En Serie";
                crono = setInterval(() => { seg++; updateDisplay(); }, 1000);
            }
        }

        function updateDisplay() {
            let m = Math.floor(seg / 60), s = seg % 60;
            document.getElementById('timer-display').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            document.getElementById('total-session-time').innerText = `${m}:${s.toString().padStart(2, '0')}`;
        }

        function nextStep(i) {
            alert("Serie completada. ¡Buen trabajo!");
            // Aquí la app "recuerda" y podría cambiar el orden mañana
            localStorage.setItem('ultimo_entreno', Date.now());
        }

        init();
    </script>
</body>
</html>
