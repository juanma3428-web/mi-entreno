<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Recovery Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .text-recovery-gold { color: #ffd60a; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 2000px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter italic">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p id="recovery-status" class="text-[9px] font-bold uppercase tracking-widest italic"></p>
        </div>
        <button onclick="document.getElementById('modal-tanita').classList.add('active')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
    </div>

    <div id="mision-container" class="space-y-3">
        </div>

    <div class="apple-card mt-6 border-t border-white/5">
        <h2 class="text-[9px] font-black text-gray-500 uppercase mb-3 tracking-widest">Carga Semanal</h2>
        <div id="weekly-dots" class="flex gap-2 justify-between">
            </div>
    </div>

    <div id="modal-tanita" class="modal-overlay">
        <div class="w-[85%] bg-[#1c1c1e] p-6 rounded-3xl border border-white/10">
            <h3 class="text-center text-[10px] font-black text-apple-green uppercase mb-6 italic tracking-widest">Datos Tanita</h3>
            <input type="number" id="tanita-peso" class="w-full bg-black p-3 rounded-xl mb-3 text-center" placeholder="Peso (kg)">
            <input type="number" id="tanita-grasa" class="w-full bg-black p-3 rounded-xl mb-3 text-center" placeholder="% Grasa">
            <input type="number" id="tanita-musculo" class="w-full bg-black p-3 rounded-xl mb-6 text-center" placeholder="Músculo (kg)">
            <button onclick="guardarTanita()" class="w-full bg-apple-green text-black py-4 rounded-xl font-black text-xs uppercase italic">Actualizar Coach</button>
        </div>
    </div>

    <script>
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 35 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || []; // Array de fechas: ['2026-03-24', '2026-03-23']

        function initCoach() {
            const container = document.getElementById('mision-container');
            const status = document.getElementById('recovery-status');
            const dots = document.getElementById('weekly-dots');
            
            // 1. Calcular fatiga (Entrenos en los últimos 4 días)
            const hoy = new Date().toDateString();
            const entrenosSeguidos = calcularRacha();
            
            // 2. Lógica de Descanso Científico
            let esDiaDeDescanso = false;
            let tipoDescanso = "";

            if (entrenosSeguidos >= 3) {
                esDiaDeDescanso = true;
                tipoDescanso = bodyComp.grasa > 21 ? "ACTIVO" : "TOTAL";
            }

            // 3. Renderizado de Interfaz
            if (esDiaDeDescanso) {
                status.innerText = "Estado: Recuperación Necesaria";
                status.classList.add('text-recovery-gold');
                
                let consejoDescanso = tipoDescanso === "ACTIVO" 
                    ? "Hoy toca Descanso Activo: Camina 45 min o haz estiramientos suaves. Tu cuerpo necesita reciclar el lactato sin carga."
                    : "Hoy toca Descanso Total: Reposo absoluto. La evidencia científica sugiere 24h de cese para supercompensar fibras.";

                container.innerHTML = `
                    <div class="apple-card border-l-4 border-yellow-500 py-10 text-center">
                        <span class="text-4xl mb-4 block">🛌</span>
                        <h2 class="text-xl font-black italic uppercase text-recovery-gold tracking-tighter">Día de Recuperación ${tipoDescanso}</h2>
                        <p class="text-[11px] text-gray-400 mt-4 px-4 font-medium leading-relaxed">${consejoDescanso}</p>
                        <button onclick="forzarEntreno()" class="mt-8 text-[9px] font-black text-gray-600 underline uppercase">Forzar entrenamiento (No recomendado)</button>
                    </div>`;
            } else {
                status.innerText = `Estado: Óptimo para Entrenar (Racha: ${entrenosSeguidos}d)`;
                status.classList.add('text-apple-green');
                generarRutina(); // Función de la V29
            }

            renderDots();
        }

        function calcularRacha() {
            let racha = 0;
            let fechaArr = [...history].reverse();
            for(let i=0; i < fechaArr.length; i++) {
                // Si hay entrenos en días consecutivos hacia atrás
                racha++;
            }
            return racha > 3 ? 3 : racha; // Limitamos para la lógica de ejemplo
        }

        function renderDots() {
            const dotsCont = document.getElementById('weekly-dots');
            dotsCont.innerHTML = '';
            // Renderizamos 7 círculos que representan la semana
            for(let i=0; i<7; i++) {
                dotsCont.innerHTML += `<div class="w-3 h-3 rounded-full bg-white/5 border border-white/10"></div>`;
            }
        }

        function generarRutina() {
            const container = document.getElementById('mision-container');
            // Aquí iría tu lógica de la V29 que ya tenemos de los bloques de ejercicios
            container.innerHTML = `
                <div class="apple-card border-l-4 border-apple-green py-6">
                    <h3 class="text-xs font-black italic uppercase">Cargando Rutina Científica...</h3>
                    <p class="text-[9px] text-gray-500 mt-1 uppercase">Analizando última sesión y Tanita</p>
                </div>
                <button onclick="logEntreno()" class="w-full bg-apple-green text-black py-4 rounded-2xl font-black text-xs uppercase italic">Marcar Misión como Completada</button>
            `;
        }

        function logEntreno() {
            const hoy = new Date().toDateString();
            if(!history.includes(hoy)) {
                history.push(hoy);
                localStorage.setItem('trainingHistory', JSON.stringify(history));
            }
            location.reload();
        }

        function forzarEntreno() {
            // Permite saltarse el descanso si el usuario lo desea
            localStorage.setItem('trainingHistory', JSON.stringify([]));
            location.reload();
        }

        function guardarTanita() {
            bodyComp.peso = document.getElementById('tanita-peso').value;
            bodyComp.grasa = document.getElementById('tanita-grasa').value;
            bodyComp.musculo = document.getElementById('tanita-musculo').value;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            location.reload();
        }

        window.onload = initCoach;
    </script>
</body>
</html>
