<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Original + IA Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
        .drawer-open { max-height: 3000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <h1 class="text-xl font-black italic tracking-tighter uppercase">APPLE COACH <span class="text-apple-green">V29</span></h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('drawer-tanita').classList.toggle('drawer-open')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
            <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚙️</button>
        </div>
    </div>

    <div id="coach-layer" class="mb-6">
        <p id="coach-msg" class="text-[9px] text-apple-green font-bold uppercase tracking-widest mb-3 ml-2 italic">Sugerencia del Coach: Cargando evidencia...</p>
        <div id="mision-diaria" class="space-y-3">
            </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-center">
            <div id="display" class="text-6xl timer-font italic">00:00</div>
            <div class="text-right">
                <span id="bpm-val" class="text-3xl font-bold text-red-500 tracking-tighter">--</span>
                <p class="text-[8px] font-black text-gray-500 uppercase">BPM</p>
            </div>
        </div>
        <div class="flex gap-2 mt-4">
            <button onclick="toggleEntreno()" id="btn-principal" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic">Confirmar e Iniciar</button>
            <button onclick="conectarPolar()" class="bg-white/5 text-white p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Polar H10</button>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4">Datos Biométricos Tanita</p>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <input type="number" id="tan-p" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center" placeholder="Peso">
                <input type="number" id="tan-g" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center" placeholder="%Grasa">
                <input type="number" id="tan-m" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center" placeholder="Músculo">
            </div>
            <button onclick="saveTanita()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Actualizar Coach</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black mb-2">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Inventario de Discos (Peso Unitario)</p>
            <div class="flex gap-2 mb-4">
                <input type="number" id="dw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs" placeholder="Peso kg">
                <input type="number" id="dq" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs" placeholder="Cantidad">
                <button onclick="addDisc()" class="bg-white/10 px-4 rounded-xl text-xs">Añadir</button>
            </div>
            <div id="lista-discos" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="apple-card bg-black">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Añadir Ejercicio a V29</p>
            <input type="text" id="tn" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2" placeholder="Nombre Ejercicio">
            <div class="flex gap-2 mb-4">
                <select id="tt" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs text-gray-400">
                    <option value="fuerza">Fuerza</option>
                    <option value="calistenia">Calistenia</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="tw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs" placeholder="Peso Base">
            </div>
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Guardar Herramienta</button>
            <div id="lista-herramientas" class="mt-4 space-y-1"></div>
        </div>
    </div>

    <script>
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 35 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];

        function init() {
            renderDiscs();
            renderTools();
            personalTrainerLogic();
        }

        // LÓGICA DE MEJORA: EL COACH SUGIERE SOBRE LA V29
        function personalTrainerLogic() {
            const container = document.getElementById('mision-diaria');
            const msg = document.getElementById('coach-msg');
            container.innerHTML = '';

            // Evidencia: Si grasa > 21% priorizar Calistenia/Cardio. Si no, Fuerza.
            let sugerencia = [];
            if(bodyComp.grasa > 21) {
                sugerencia = myTools.filter(t => t.t !== 'fuerza').slice(0,3);
                msg.innerText = "Coach: Plan Definición (Basado en tu % Grasa)";
            } else {
                sugerencia = myTools.filter(t => t.t === 'fuerza').slice(0,3);
                msg.innerText = "Coach: Plan Hipertrofia (Basado en tu Masa Muscular)";
            }

            sugerencia.forEach(t => {
                const color = t.t === 'calistenia' ? 'border-blue-500' : 'border-apple-green';
                container.innerHTML += `
                    <div class="apple-card border-l-2 ${color} py-4 flex justify-between items-center">
                        <div>
                            <p class="text-[8px] text-gray-500 font-black uppercase">${t.t}</p>
                            <h3 class="font-black text-xs uppercase italic">${t.n}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold">${t.t==='fuerza' ? t.w+'kg Base' : 'Peso Cuerpo'}</p>
                        </div>
                    </div>`;
            });
        }

        // FUNCIONES V29 RESTAURADAS
        function addDisc() {
            const w = parseFloat(document.getElementById('dw').value);
            const q = parseInt(document.getElementById('dq').value);
            if(w && q) { myDiscs.push({w, q}); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); renderDiscs(); }
        }

        function renderDiscs() {
            const cont = document.getElementById('lista-discos');
            cont.innerHTML = '';
            myDiscs.forEach(d => {
                cont.innerHTML += `<span class="bg-white/5 border border-white/10 px-2 py-1 rounded text-[9px] font-bold">${d.q}x${d.w}kg</span>`;
            });
        }

        function addTool() {
            const n = document.getElementById('tn').value;
            const t = document.getElementById('tt').value;
            const w = parseFloat(document.getElementById('tw').value || 0);
            if(n) { myTools.push({id: Date.now(), n, t, w}); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); renderTools(); personalTrainerLogic(); }
        }

        function renderTools() {
            const cont = document.getElementById('lista-herramientas');
            cont.innerHTML = '';
            myTools.forEach(t => {
                cont.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px] uppercase font-bold">
                    <span>${t.n}</span>
                    <button onclick="deleteTool(${t.id})" class="text-red-500">✕</button>
                </div>`;
            });
        }

        function saveTanita() {
            bodyComp.peso = document.getElementById('tan-p').value;
            bodyComp.grasa = document.getElementById('tan-g').value;
            bodyComp.musculo = document.getElementById('tan-m').value;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            location.reload();
        }

        function deleteTool(id) {
            myTools = myTools.filter(t => t.id !== id);
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
