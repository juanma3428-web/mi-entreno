<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entreno Pro - Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .modo-serie { background: #450a0a !important; border-color: #ef4444; }
        .modo-descanso { background: #064e3b !important; border-color: #10b981; }
        .heart-rate-circle { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto; }
        .anim-pulse { animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
        
        /* Estilos para el desplegable */
        .dropdown-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .dropdown-open { max-height: 500px; overflow-y: auto; }
        .chip { padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; background: #334155; border: 1px solid transparent; transition: 0.2s; text-align: center; cursor: pointer; }
        .chip.active { background: #1d4ed8; border-color: #60a5fa; color: white; }
    </style>
</head>
<body class="p-5 pb-32">

    <div class="apple-card text-center border-t-4 border-red-500">
        <div id="heart-box" class="heart-rate-circle mb-2">
            <span id="bpm-val" class="text-4xl font-black">--</span>
            <span class="text-[9px] font-bold text-red-500 uppercase">BPM</span>
        </div>
        <button onclick="conectarPolar()" id="btn-sensor" class="text-[10px] text-red-400 font-black uppercase tracking-widest">Vincular Polar</button>
    </div>

    <div class="apple-card">
        <button onclick="toggleEquip()" class="w-full flex justify-between items-center py-1">
            <span class="text-[11px] font-black uppercase text-blue-400 tracking-widest">Configurar Mi Gimnasio</span>
            <span id="arrow" class="transition-transform duration-300">▼</span>
        </button>
        
        <div id="equip-content" class="dropdown-content mt-4">
            <p class="text-[9px] text-gray-400 mb-3 italic">Toca para añadir o quitar de tu inventario:</p>
            <div id="lista-equip" class="grid grid-cols-2 gap-2">
                </div>
        </div>
    </div>

    <div id="timer-card" class="apple-card text-center transition-all duration-500">
        <div id="display" class="text-6xl font-mono font-bold mb-4 tracking-tighter">00:00</div>
        <div class="flex gap-2">
            <button id="btn-principal" onclick="toggleFase()" class="flex-1 bg-blue-600 py-3 rounded-xl font-black text-xs uppercase">Iniciar Serie</button>
            <button id="btn-pausa" onclick="pausar()" class="w-14 bg-slate-700 py-3 rounded-xl font-bold opacity-30" disabled>||</button>
        </div>
    </div>

    <h2 class="text-[11px] font-bold uppercase text-gray-500 ml-2 mb-2 tracking-widest">Rutina Recomendada</h2>
    <div id="contenedor-ejercicios"></div>

    <script>
        let segundos = 0, crono, estado = 'parado';

        // LISTA MAESTRA DE EQUIPAMIENTO (Orden Alfabético)
        const catalogo = [
            "Ab wheel", "Anillas", "Banda elástica", "Banda de resistencia", "Barra de dominadas", "Barra Z", "Barra olímpica",
            "Bici de carretera", "Bici de montaña", "Bici estática", "Cajón pliométrico", "Cinta de correr", "Comba", "Esterilla",
            "Fitball", "Gomas elásticas", "Kettlebell", "Mancuernas", "Multiestación", "Paralelas", "Pesas de tobillo",
            "Poleas", "Rodillo de rulos", "Saco de boxeo", "Silla", "Step", "TRX"
        ].sort();

        // INICIALIZACIÓN
        function init() {
            const lista = document.getElementById('lista-equip');
            catalogo.forEach(item => {
                const isActive = localStorage.getItem('equip_' + item) === 'true';
                lista.innerHTML += `
                    <div id="item-${item}" onclick="toggleItem('${item}')" class="chip ${isActive ? 'active' : ''}">
                        ${item.toUpperCase()}
                    </div>`;
            });
            renderEjercicios();
        }

        function toggleEquip() {
            const content = document.getElementById('equip-content');
            const arrow = document.getElementById('arrow');
            content.classList.toggle('dropdown-open');
            arrow.style.transform = content.classList.contains('dropdown-open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function toggleItem(item) {
            const el = document.getElementById('item-' + item);
            const newState = !el.classList.contains('active');
            el.classList.toggle('active');
            localStorage.setItem('equip_' + item, newState); // Guarda en iPhone
            renderEjercicios();
        }

        // LÓGICA DE EJERCICIOS (Magia: Solo muestra lo que tienes)
        const dbEjercicios = [
            {n: "Press de Banca", eq: ["Multiestación", "Barra olímpica", "Mancuernas"]},
            {n: "Polea Alta", eq: ["Multiestación", "Poleas"]},
            {n: "Rodillo/Cardio", eq: ["Rodillo de rulos", "Bici de carretera", "Bici de montaña"]},
            {n: "Sentadilla Pro", eq: ["Mancuernas", "Kettlebell", "Barra Z"]},
            {n: "Fondos", eq: ["Silla", "Paralelas", "Anillas"]},
            {n: "Remo", eq: ["Banda elástica", "Gomas elásticas", "Multiestación"]},
            {n: "Running", eq: ["Cinta de correr"]}
        ];

        function renderEjercicios() {
            const cont = document.getElementById('contenedor-ejercicios');
            cont.innerHTML = '';
            
            dbEjercicios.forEach((ej, i) => {
                // Comprobar si el usuario tiene al menos una de las herramientas necesarias
                const tieneHerramienta = ej.eq.some(h => localStorage.getItem('equip_' + h) === 'true');
                
                if (tieneHerramienta) {
                    cont.innerHTML += `
                        <div class="apple-card py-4 bg-slate-900/40 border-l-4 border-blue-500">
                            <div class="flex justify-between items-center">
                                <div><h3 class="font-bold text-sm uppercase">${ej.n}</h3><p class="text-[9px] text-blue-400 italic">Usando: ${ej.eq.find(h => localStorage.getItem('equip_'+h)==='true')}</p></div>
                                <div class="flex gap-2">
                                    <input type="number" id="kg-${i}" class="bg-slate-800 text-white rounded-lg w-12 text-center text-xs p-2 border border-slate-700" placeholder="Kg">
                                    <button class="bg-green-600/20 text-green-400 px-3 rounded-lg font-bold text-[10px]">OK</button>
                                </div>
                            </div>
                        </div>`;
                }
            });
            if(cont.innerHTML === '') cont.innerHTML = '<p class="text-center text-gray-500 text-[10px] mt-4">Configura tu equipamiento para ver ejercicios disponibles.</p>';
        }

        // --- FUNCIONES DE CONTROL (CRONO Y POLAR) ---
        async function conectarPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('bpm-val').innerText = e.target.value.getUint8(1);
                    document.getElementById('heart-box').classList.add('anim-pulse');
                });
                document.getElementById('btn-sensor').innerText = "POLAR CONECTADO ✅";
            } catch (e) { alert("Error de conexión."); }
        }

        function toggleFase() {
            const btn = document.getElementById('btn-principal'), card = document.getElementById('timer-card');
            document.getElementById('btn-pausa').disabled = false;
            document.getElementById('btn-pausa').classList.remove('opacity-30');
            if (estado !== 'serie') {
                estado = 'serie'; segundos = 0; btn.innerText = "FINALIZAR SERIE";
                card.className = "apple-card text-center modo-serie transition-all duration-500";
                clearInterval(crono); crono = setInterval(() => { segundos++; actDisplay(); }, 1000);
            } else {
                estado = 'descanso'; segundos = 90; btn.innerText = "SALTAR DESCANSO";
                card.className = "apple-card text-center modo-descanso transition-all duration-500";
                clearInterval(crono); crono = setInterval(() => { segundos--; actDisplay(); if(segundos<=0) resetCrono(); }, 1000);
            }
        }

        function actDisplay() {
            let m = Math.floor(segundos/60), s = segundos%60;
            document.getElementById('display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function pausar() {
            if (estado === 'pausa') {
                estado = 'serie'; crono = setInterval(() => { segundos++; actDisplay(); }, 1000);
                document.getElementById('btn-pausa').innerText = "||";
            } else {
                clearInterval(crono); estado = 'pausa';
                document.getElementById('btn-pausa').innerText = "▶";
            }
        }

        function resetCrono() {
            clearInterval(crono); estado = 'parado'; segundos = 0; actDisplay();
            document.getElementById('timer-card').className = "apple-card text-center transition-all duration-500";
            document.getElementById('btn-principal').innerText = "INICIAR SERIE";
        }

        init();
        actDisplay();
    </script>
</body>
</html>
