<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V24 - Fix Crono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 1200px; }
        .chip-container { display: flex; align-items: center; background: #2c2c2e; border-radius: 12px; overflow: hidden; margin-bottom: 6px; border: 1px solid transparent; }
        .chip-container.active { border-color: #30d158; }
        .chip-label { flex: 1; padding: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .chip-container.active .chip-label { background: #30d158; color: #000; }
        .btn-del { padding: 12px; color: #ff3b30; font-weight: bold; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .btn-esfuerzo { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; font-size: 11px; margin-bottom: 8px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="modal-feedback" class="modal-overlay">
        <div class="w-[90%] max-w-sm text-center">
            <h2 class="text-2xl font-black mb-2 italic text-white">¿Cómo fue el esfuerzo?</h2>
            <p class="text-[10px] text-gray-500 mb-8 uppercase tracking-widest font-bold">Ajustaremos los kilos para mañana</p>
            <button onclick="procesarFeedback(-4)" class="btn-esfuerzo bg-red-600/20 text-red-500 border border-red-500/30">🥵 AGOTADOR (Bajar 4kg)</button>
            <button onclick="procesarFeedback(-2)" class="btn-esfuerzo bg-orange-600/20 text-orange-500 border border-orange-500/30">🔥 DURO (Bajar 2kg)</button>
            <button onclick="procesarFeedback(0)" class="btn-esfuerzo bg-blue-600/20 text-blue-400 border border-blue-500/30">👍 NORMAL (Mantener kilos)</button>
            <button onclick="procesarFeedback(2)" class="btn-esfuerzo bg-green-600/20 text-apple-green border border-apple-green/30">✨ SUAVE (Subir 2kg mañana)</button>
        </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-start mb-4">
            <div>
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Polar H10 Live</p>
                <div class="flex items-baseline gap-1">
                    <span id="bpm-val" class="text-6xl font-bold tracking-tighter">--</span>
                    <span class="text-red-500 font-bold text-sm italic">BPM</span>
                </div>
            </div>
            <button onclick="conectarPolar()" class="w-12 h-12 rounded-full bg-red-600/10 flex items-center justify-center text-xl">❤️</button>
        </div>
        <div class="flex justify-between font-bold border-t border-white/5 pt-4">
            <div id="kcal-val" class="text-2xl text-orange-500">0 <span class="text-xs">KCAL</span></div>
            <div id="session-time" class="text-2xl tracking-tighter italic">0:00</div>
        </div>
    </div>

    <div class="apple-card text-center">
        <div id="display" class="text-7xl timer-font mb-8 italic">00:00</div>
        <div class="flex gap-4">
            <button id="btn-pausa" onclick="pausar()" class="w-16 h-16 rounded-full bg-yellow-500/10 flex items-center justify-center opacity-20" disabled>
                <span id="pause-icon" class="text-yellow-500 text-xl font-bold">||</span>
            </button>
            <button id="btn-principal" onclick="toggleEntreno()" class="flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase tracking-widest italic">Iniciar Sesión</button>
        </div>
    </div>

    <div class="apple-card">
        <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-full flex justify-between items-center">
            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Pesos e Inventario</span>
            <span class="text-apple-green text-xs font-bold italic">Gestionar</span>
        </button>
        <div id="equip-drawer" class="drawer">
            <div class="mt-4 p-4 bg-white/5 rounded-2xl mb-4 border border-white/5">
                <input type="text" id="new-tool-name" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs mb-2" placeholder="Ej: Mancuerna">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <select id="new-tool-type" class="bg-black border border-white/10 rounded-xl p-3 text-xs text-gray-400">
                        <option value="fuerza">Fuerza</option>
                        <option value="cardio">Cardio</option>
                    </select>
                    <input type="number" id="new-tool-weight" class="bg-black border border-white/10 rounded-xl p-3 text-xs" placeholder="Kg Iniciales">
                </div>
                <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Añadir</button>
            </div>
            <div id="lista-equip"></div>
        </div>
    </div>

    <div class="px-2 mb-4">
        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Sugerencia del Coach</h2>
        <p id="coach-reason" class="text-[11px] text-apple-green italic mt-1 font-medium"></p>
    </div>
    <div id="contenedor-rutina" class="space-y-3"></div>

    <script>
        let seg=0, crono = null, running=false, paused=false, kcal=0;
        let myTools = JSON.parse(localStorage.getItem('myToolsV24')) || [
            {id: 1, n: "Multiestación", t: "fuerza", w: 40},
            {id: 2, n: "Rodillo", t: "cardio", w: 0},
            {id: 3, n: "Mancuernas", t: "fuerza", w: 10}
        ];
        let globalWeightAdjust = parseFloat(localStorage.getItem('globalWeightAdjust')) || 0;

        function init() { renderTools(); generarRutinaInteligente(); }

        function toggleEntreno() {
            const btn = document.getElementById('btn-principal');
            const pBtn = document.getElementById('btn-pausa');
            
            if (!running) {
                // INICIAR
                running = true; paused = false;
                btn.innerText = "FINALIZAR";
                btn.classList.replace('bg-apple-green','bg-red-600');
                btn.classList.replace('text-black','text-white');
                pBtn.disabled = false;
                pBtn.classList.remove('opacity-20');
                document.getElementById('pause-icon').innerText = "||";
                
                if(crono) clearInterval(crono);
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                // FINALIZAR - PAUSA PRIMERO EL TIEMPO
                if(crono) { clearInterval(crono); crono = null; }
                document.getElementById('modal-feedback').classList.add('active');
            }
        }

        function pausar() {
            if (!running) return;
            const icon = document.getElementById('pause-icon');
            if (!paused) {
                paused = true;
                if(crono) { clearInterval(crono); crono = null; }
                icon.innerText = "▶";
            } else {
                paused = false;
                icon.innerText = "||";
                if(crono) clearInterval(crono);
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            const t = `${m}:${s.toString().padStart(2,'0')}`;
            document.getElementById('display').innerText = t;
            document.getElementById('session-time').innerText = t;
        }

        function procesarFeedback(kgChange) {
            globalWeightAdjust += kgChange;
            localStorage.setItem('globalWeightAdjust', globalWeightAdjust);
            
            // RESET TOTAL
            running = false; paused = false;
            if(crono) { clearInterval(crono); crono = null; }
            seg = 0; updateDisp();
            
            document.getElementById('btn-principal').innerText = "INICIAR SESIÓN";
            document.getElementById('btn-principal').className = "flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase tracking-widest italic";
            document.getElementById('btn-pausa').disabled = true;
            document.getElementById('btn-pausa').classList.add('opacity-20');
            document.getElementById('modal-feedback').classList.remove('active');
            
            generarRutinaInteligente();
        }

        function generarRutinaInteligente() {
            const cont = document.getElementById('contenedor-rutina');
            const reason = document.getElementById('coach-reason');
            cont.innerHTML = '';
            const activas = myTools.filter(t => localStorage.getItem('e_'+t.n) === 'true');
            if(activas.length === 0) { reason.innerText = "Activa herramientas."; return; }

            const ultimaSesion = localStorage.getItem('tipo_ultima_sesion');
            let tipoHoy = (ultimaSesion === 'fuerza') ? 'cardio' : 'fuerza';
            reason.innerText = (tipoHoy === 'cardio') ? "Sesión aeróbica recomendada hoy." : `Fuerza con ajuste de ${globalWeightAdjust}kg.`;

            activas.filter(t => t.t === tipoHoy).slice(0, 3).forEach(tool => {
                let sugerencia = tool.t === 'cardio' ? "35 min ritmo constante." : `4x12 Reps. Carga: ${Math.max(0, tool.w + globalWeightAdjust)}kg`;
                cont.innerHTML += `
                    <div class="apple-card border-l-2 border-apple-green flex justify-between items-center py-5">
                        <div class="flex-1"><h3 class="font-black text-xs uppercase italic">${tool.n}</h3><p class="text-[10px] text-gray-500 font-bold uppercase mt-1 italic">${sugerencia}</p></div>
                        <button onclick="completarEj('`+tool.t+`')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-black text-[10px] text-apple-green">LOG</button>
                    </div>`;
            });
        }

        function completarEj(tipo) { localStorage.setItem('tipo_ultima_sesion', tipo); generarRutinaInteligente(); }

        function renderTools() {
            const cont = document.getElementById('lista-equip'); cont.innerHTML = '';
            myTools.forEach(tool => {
                const act = localStorage.getItem('e_'+tool.n) === 'true';
                cont.innerHTML += `<div class="chip-container ${act?'active':''}">
                    <div class="chip-label" onclick="toggleTool('${tool.n}')">${tool.n} <span class="opacity-40 text-[8px]">(${tool.w}kg)</span></div>
                    <button onclick="deleteTool(${tool.id})" class="btn-del text-xs">✕</button></div>`;
            });
        }

        function addTool() {
            const name = document.getElementById('new-tool-name').value.trim();
            const type = document.getElementById('new-tool-type').value;
            const weight = parseFloat(document.getElementById('new-tool-weight').value || 0);
            if(name) {
                myTools.push({ id: Date.now(), n: name, t: type, w: weight });
                localStorage.setItem('myToolsV24', JSON.stringify(myTools));
                localStorage.setItem('e_'+name, 'true');
                document.getElementById('new-tool-name').value = ''; init();
            }
        }

        function deleteTool(id) { myTools = myTools.filter(t => t.id !== id); localStorage.setItem('myToolsV24', JSON.stringify(myTools)); init(); }
        function toggleTool(name) { localStorage.setItem('e_'+name, localStorage.getItem('e_'+name) !== 'true'); init(); }

        async function conectarPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value.getUint8(1);
                    document.getElementById('bpm-val').innerText = v;
                    kcal += (v * 0.012);
                    document.getElementById('kcal-val').innerHTML = `${Math.floor(kcal)} <span class="text-xs">KCAL</span>`;
                });
            } catch (e) { console.log(e); }
        }

        init();
    </script>
</body>
</html>
