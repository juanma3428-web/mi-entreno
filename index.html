p<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenador Personal Pro - V16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .apple-card { background: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #334155; }
        .modo-serie { background: #450a0a !important; border-color: #ef4444; }
        .modo-descanso { background: #064e3b !important; border-color: #10b981; }
        .dropdown-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .dropdown-open { max-height: 1000px; }
        .chip { padding: 8px; border-radius: 12px; font-size: 10px; font-weight: bold; background: #334155; border: 1px solid transparent; text-align: center; cursor: pointer; }
        .chip.active { background: #2563eb; border-color: #60a5fa; color: white; }
        
        /* Modal de Ayuda Técnica */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #1e293b; width: 90%; max-width: 350px; border-radius: 24px; padding: 25px; border: 1px solid #475569; transform: scale(0.9); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .help-gif { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 2px solid #334155; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="help-modal" class="modal-overlay" onclick="cerrarAyuda()">
        <div class="modal-content text-center" onclick="event.stopPropagation()">
            <h3 id="help-title" class="text-xl font-black uppercase mb-3">Técnica</h3>
            <img id="help-gif-img" src="" alt="Demostración" class="help-gif">
            <div id="help-text" class="text-xs text-left text-gray-300 space-y-2 bg-slate-900/50 p-4 rounded-xl border border-slate-700"></div>
            <button onclick="cerrarAyuda()" class="mt-5 w-full bg-blue-600 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-white">Cerrar</button>
        </div>
    </div>

    <div class="apple-card border-t-4 border-pink-500">
        <p class="text-[10px] font-black uppercase text-pink-400 mb-4 tracking-widest">Sincronización Polar H10 / Health</p>
        <div class="grid grid-cols-3 gap-3 mb-5">
            <div class="bg-slate-900/50 p-3 rounded-2xl text-center border border-slate-700">
                <p class="text-[8px] text-gray-400 uppercase font-bold">BPM Med.</p>
                <p id="bpm-val" class="text-xl font-black">--</p>
            </div>
            <div class="bg-slate-900/50 p-3 rounded-2xl text-center border border-slate-700">
                <p class="text-[8px] text-gray-400 uppercase font-bold">Kcal Est.</p>
                <p id="kcal-val" class="text-xl font-black">0</p>
            </div>
            <div class="bg-slate-900/50 p-3 rounded-2xl text-center border border-slate-700">
                <p class="text-[8px] text-gray-400 uppercase font-bold">Tiempo</p>
                <p id="total-session-time" class="text-xl font-black">0m</p>
            </div>
        </div>
        <button onclick="conectarPolar()" id="btn-sensor" class="w-full bg-pink-600/20 text-pink-400 py-3 rounded-xl border border-pink-500/30 text-xs font-black uppercase">
            Vincular Banda Polar
        </button>
    </div>

    <div class="apple-card">
        <button onclick="document.getElementById('equip-content').classList.toggle('dropdown-open')" class="w-full flex justify-between items-center py-1">
            <span class="text-[10px] font-black uppercase text-blue-400">Mi Equipamiento en Casa</span>
            <span class="text-xs">▼</span>
        </button>
        <div id="equip-content" class="dropdown-content mt-4">
            <div id="lista-equip" class="grid grid-cols-2 gap-2">
                </div>
        </div>
    </div>

    <div id="timer-card" class="apple-card text-center transition-all duration-500">
        <div id="display" class="text-6xl font-mono font-bold mb-4 tracking-tighter">00:00</div>
        <div class="flex gap-2">
            <button id="btn-principal" onclick="toggleFase()" class="flex-1 bg-blue-600 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Iniciar</button>
            <button id="btn-pausa" onclick="pausar()" class="w-14 bg-slate-700 py-3 rounded-xl font-bold opacity-30" disabled>||</button>
        </div>
    </div>

    <div class="flex justify-between items-center px-2 mb-3">
        <h2 class="text-[11px] font-black uppercase text-gray-500 tracking-widest">Sugerencia del Entrenador</h2>
    </div>
    
    <div id="contenedor-ejercicios"></div>

    <script>
        let seg=0,crono,estado='parado',paused=false,bpmArray=[],kcal=0;
        const catalogo = ["Multiestación", "Rodillo de rulos", "Cinta correr", "Mancuernas", "Silla", "Esterilla", "Barra de Pecho"].sort();
        
        // BASE DE DATOS TÉCNICA (GIFS Y TEXTO)
        const ayudaTécnica = {
            "Press de Banca": {
                gif: "https://media.giphy.com/media/l0HlCqV3E6o6k9uYw/giphy.gif",
                puntos: ["Pies bien apoyados.", "Baja controlado hasta el pecho.", "Empuja explosivo sin bloquear codos."]
            },
            "Polea Alta": {
                gif: "https://media.giphy.com/media/l0HlJgY6w7A8O38Gg/giphy.gif",
                puntos: ["Pecho arriba, espalda recta.", "Codos hacia abajo y atrás.", "Contrae la espalda al final."]
            }
        };

        // LÓGICA DE PROGRESIÓN (MEMORIA INTERACTIVA)
        function getPlanProgresivo() {
            // Comprobamos qué se hizo la última vez
            const ultimaVez = localStorage.getItem('ultimo_entreno_tipo');
            const pressBancaKg = localStorage.getItem('kg-Press de Banca') || 0;

            let plan = [];
            // Si ayer hizo Press Banca, hoy toca cambiar. Si no, sugerimos Press Banca.
            if (ultimaVez === 'fuerza-pecho') {
                plan = [
                    {n: "Rodillo", eq: "Rodillo de rulos", meta: "30 min constantes"},
                    {n: "Polea Alta", eq: "Multiestación", meta: "3x12 (Espalda)"}
                ];
            } else {
                // Progresión interactiva para Press Banca
                let series = 2, reps = 5;
                if(pressBancaKg > 0) { series = 3; reps = 10; } // Si ya hay peso registrado, subimos volumen

                plan = [
                    {n: "Press de Banca", eq: "Barra de Pecho", meta: `${series}x${reps} (Pecho)`},
                    {n: "Cinta correr", eq: "Cinta correr", meta: "15 min (Cardio)"}
                ];
            }
            return plan;
        }

        function init() {
            const lista = document.getElementById('lista-equip');
            lista.innerHTML = '';
            catalogo.forEach(item => {
                const act = localStorage.getItem('e_'+item) === 'true';
                lista.innerHTML += `<div onclick="toggleEq('${item}')" id="item-${item}" class="chip ${act?'active':''}">${item.toUpperCase()}</div>`;
            });
            renderEjercicios();
        }

        function toggleEq(item) {
            localStorage.setItem('e_'+item, localStorage.getItem('e_'+item) !== 'true');
            init();
        }

        function renderEjercicios() {
            const cont = document.getElementById('contenedor-ejercicios');
            cont.innerHTML = '';
            const plan = getPlanProgresivo();
            
            plan.forEach((ej, i) => {
                const tiene = localStorage.getItem('e_'+ej.eq) === 'true';
                if (tiene) {
                    cont.innerHTML += `
                        <div class="apple-card py-4 border-l-4 border-blue-500 flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="font-bold text-xs uppercase">${ej.n}</h3>
                                    ${ayudaTécnica[ej.n] ? `<button onclick="abrirAyuda('${ej.n}')" class="w-5 h-5 bg-slate-700 rounded-full text-[10px] font-bold text-blue-400">?</button>` : ''}
                                </div>
                                <p class="text-[9px] text-blue-400 font-bold">${ej.meta}</p>
                            </div>
                            <div class="flex gap-2">
                                <input type="number" id="kg-${i}" class="bg-slate-800 text-white rounded-lg w-12 text-center text-xs p-2 border border-slate-700" placeholder="Kg">
                                <button onclick="finalizarEjercicio('${ej.n}', ${i})" class="bg-green-600 px-3 rounded-lg font-bold text-[10px]">OK</button>
                            </div>
                        </div>`;
                }
            });
        }

        // MEMORIA: Guardar qué se hizo para mañana cambiar
        function finalizarEjercicio(nombre, idx) {
            const kg = document.getElementById(`kg-${idx}`).value;
            localStorage.setItem(`kg-${nombre}`, kg);
            if(nombre === "Press de Banca") localStorage.setItem('ultimo_entreno_tipo', 'fuerza-pecho');
            else if(nombre === "Rodillo") localStorage.setItem('ultimo_entreno_tipo', 'cardio');
            
            alert(`Buen trabajo en ${nombre}. Mañana adaptaremos el entreno.`);
            renderEjercicios(); // Recarga para mostrar progresión visual
        }

        function abrirAyuda(nombre) {
            const data = ayudaTécnica[nombre];
            document.getElementById('help-title').innerText = nombre;
            document.getElementById('help-gif-img').src = data.gif;
            const text = document.getElementById('help-text');
            text.innerHTML = '<p class="font-bold mb-1">Técnica:</p>';
            data.puntos.forEach(p => text.innerHTML += `<p>• ${p}</p>`);
            document.getElementById('help-modal').classList.add('active');
        }
        function cerrarAyuda() { document.getElementById('help-modal').classList.remove('active'); }

        // BLUETOOTH POLAR REAL
        async function conectarPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const bpm = e.target.value.getUint8(1);
                    document.getElementById('bpm-val').innerText = bpm;
                    // Lógica para Kcal (estimación por BPM)
                    kcal += (bpm * 0.015);
                    document.getElementById('kcal-val').innerText = Math.floor(kcal);
                });
                document.getElementById('btn-sensor').innerText = "CONECTADO ✅";
                document.getElementById('btn-sensor').className = "w-full bg-green-600/20 text-green-400 py-3 rounded-xl border border-green-500/30 text-xs font-black uppercase";
            } catch (e) { alert("Error de conexión. Activa Bluetooth."); }
        }

        function toggleFase() {
            const btn = document.getElementById('btn-principal'), pBtn = document.getElementById('btn-pausa');
            if (estado !== 'serie') {
                estado = 'serie'; seg = 0; kcal=0;
                btn.innerText = "FINALIZAR";
                document.getElementById('timer-card').classList.add('modo-serie');
                pBtn.disabled = false; pBtn.classList.remove('opacity-30');
                clearInterval(crono); crono = setInterval(() => { seg++; actDisplay(); }, 1000);
            } else {
                clearInterval(crono); estado = 'parado'; 
                btn.innerText = "INICIAR";
                document.getElementById('timer-card').classList.remove('modo-serie');
                pBtn.disabled = true; pBtn.classList.add('opacity-30');
            }
        }

        function actDisplay() {
            let m=Math.floor(seg/60),s=seg%60;
            document.getElementById('display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function pausar() {
            const pBtn = document.getElementById('btn-pausa');
            if (!paused) { paused=true; clearInterval(crono); pBtn.innerText = "▶"; pBtn.classList.add('bg-yellow-600'); }
            else { paused=false; crono = setInterval(() => { seg++; actDisplay(); }, 1000); pBtn.innerText = "||"; pBtn.classList.remove('bg-yellow-600'); }
        }

        init(); actDisplay();
    </script>
</body>
</html>
