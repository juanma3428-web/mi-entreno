<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entreno Pro - Master Fijo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .apple-card { background: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #334155; }
        
        /* Modal de Ayuda Mejorado */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #1e293b; width: 90%; max-width: 350px; border-radius: 24px; padding: 25px; border: 2px solid #475569; transform: scale(0.9); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: scale(1); }

        /* ANIMACIÓN NATIVA (Sustituye al GIF roto) */
        .guia-visual-nativa { width: 100%; h-40; background: #0f172a; border-radius: 16px; border: 2px solid #334155; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;}
        .polea-rod { width: 4px; height: 100%; background: #334155; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        .polea-handle { width: 60px; height: 10px; background: #60a5fa; border-radius: 5px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); animation: movePolea 2.5s infinite ease-in-out; }
        @keyframes movePolea { 0%, 100% { top: 20px; } 50% { top: 120px; } }
        .check-text { font-size: 9px; color: #60a5fa; text-transform: uppercase; font-weight: bold; position: absolute; bottom: 10px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="help-modal" class="modal-overlay" onclick="cerrarAyuda()">
        <div class="modal-content text-center" onclick="event.stopPropagation()">
            <h3 id="help-title" class="text-xl font-black uppercase mb-4 tracking-tight">Técnica</h3>
            
            <div class="guia-visual-nativa h-40">
                <div class="polea-rod"></div>
                <div class="polea-handle"></div>
                <span class="check-text">Guía de Movimiento Nativa</span>
            </div>

            <div id="help-text" class="text-xs text-left text-gray-300 space-y-2 mb-6 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                <p>• Pecho arriba.</p>
                <p>• Codos hacia abajo y atrás.</p>
                <p>• Contrae la espalda al final.</p>
                <p>• Sube controlado.</p>
            </div>
            <button onclick="cerrarAyuda()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs tracking-widest text-white shadow-lg shadow-blue-900/50">Entendido</button>
        </div>
    </div>

    <div class="apple-card flex justify-between items-center border-t-4 border-red-600">
        <div><p class="text-[9px] uppercase font-black text-gray-500">Banda Polar</p><span id="bpm-val" class="text-4xl font-black">--</span> <span class="text-xs text-red-500 font-bold">BPM</span></div>
        <button onclick="conectarPolar()" id="btn-sensor" class="bg-red-600/10 text-red-500 px-4 py-2 rounded-full text-[10px] font-bold border border-red-500/20">VINCULAR</button>
    </div>

    <div id="timer-card" class="apple-card text-center transition-all duration-500 mt-4">
        <div id="display" class="text-6xl font-mono font-bold mb-4">00:00</div>
        <button id="btn-principal" onclick="toggleFase()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Iniciar Serie</button>
    </div>

    <div id="contenedor-ejercicios" class="mt-4">
        <div class="apple-card flex justify-between items-center py-4 border-l-4 border-blue-500">
            <div>
                <div class="flex items-center gap-2">
                    <h3 class="font-bold text-xs uppercase">Polea Alta</h3>
                    <button onclick="abrirAyuda('Polea Alta')" class="w-5 h-5 bg-slate-700 rounded-full text-[10px] font-bold text-blue-400">?</button>
                </div>
                <p class="text-[8px] text-blue-400 italic">Multiestación</p>
            </div>
            <input type="number" class="bg-slate-800 text-white rounded-lg w-10 text-center text-xs p-2" placeholder="Kg">
        </div>
    </div>

    <script>
        // Funciones básicas para que el Modal funcione
        function abrirAyuda(nombre) { document.getElementById('help-modal').classList.add('active'); }
        function cerrarAyuda() { document.getElementById('help-modal').classList.remove('active'); }
        // ... (resto de funciones de crono/polar de versiones anteriores) ...
        let segundos=0,crono,estado='parado';function actDisplay(){let m=Math.floor(segundos/60),s=segundos%60;document.getElementById('display').innerText=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`}function toggleFase(){const b=document.getElementById('btn-principal');if(estado!=='serie'){estado='serie';segundos=0;b.innerText="TERMINAR SERIE";clearInterval(crono);crono=setInterval(()=>{segundos++;actDisplay()},1000)}else{estado='parado';segundos=0;b.innerText="INICIAR SERIE";clearInterval(crono);actDisplay()}}
    </script>
</body>
</html>
