<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Base Original + Capa Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 3000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <h1 class="text-xl font-black italic tracking-tighter uppercase">APPLE COACH <span class="text-apple-green">V29</span></h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('drawer-tanita').classList.toggle('drawer-open')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
            <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚙️</button>
        </div>
    </div>

    <div id="coach-layer" class="mb-6">
        <div class="flex justify-between items-center mb-4 ml-2">
            <p id="coach-status" class="text-[9px] text-apple-green font-black uppercase tracking-widest italic">Capa Coach Activa</p>
            <button onclick="generarMision()" class="text-[8px] font-black text-gray-500 uppercase underline">Sugerir Otro</button>
        </div>
        <div id="mision-container" class="space-y-3">
            </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-center mb-4">
            <div id="display" class="text-6xl timer-font italic">00:00</div>
            <div class="text-right">
                <span id="bpm-val" class="text-3xl font-bold text-red-500 tracking-tighter">--</span>
                <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest italic">Live BPM</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-start" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic">Iniciar</button>
            <button onclick="pausarEntreno()" id="btn-pause" class="bg-white/10 text-white p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Pausar</button>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4">Métricas Tanita</p>
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="tan-p" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center" placeholder="Peso">
                <input type="number" id="tan-g" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center" placeholder="%Grasa">
                <input type="number" id="tan-m" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center" placeholder="Músculo">
            </div>
            <button onclick="saveTanita()" class="w-full mt-4 bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Guardar</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black mb-2">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Inventario Discos (Unitario)</p>
            <div class="flex gap-2 mb-4">
                <input type="number" id="dw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs" placeholder="Peso kg">
                <input type="number" id="dq" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs" placeholder="Cant.">
                <button onclick="addDisc()" class="bg-white/10 px-4 rounded-xl text-[10px] font-bold">Add</button>
            </div>
            <div id="lista-discos" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="apple-card bg-black">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-2 italic tracking-tighter">Base de Datos y Selección</p>
            <input type="text" id="tn" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2" placeholder="Nombre Ejercicio">
            <div class="flex gap-2 mb-4">
                <select id="tt" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs text-gray-400">
                    <option value="fuerza">Fuerza</option>
                    <option value="calistenia">Calistenia</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="tw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs" placeholder="Peso Base">
            </div>
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic mb-4">Guardar Nueva</button>
            
            <p class="text-[8px] font-black text-gray-600 uppercase mb-2 tracking-widest">Activar/Desactivar para el Coach:</p>
            <div id="lista-herramientas" class="space-y-1"></div>
        </div>
    </div>

    <script>
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 34 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];
        
        // CRONÓMETRO CON PAUSA
        let seg=0, crono=null, running=false, pausado=false;

        function init() {
            renderDiscs();
            renderTools();
            generarMision();
        }

        // --- MEJORA: LÓGICA DE ENTRENADOR DINÁMICO ---
        function generarMision() {
            const container = document.getElementById('mision-container');
            const status = document.getElementById('coach-status');
            container.innerHTML = '';

            // Solo ejercicios marcados como "active" en el configurador
            let pool = myTools.filter(t => t.active !== false);

            if (pool.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-[9px] text-gray-500 uppercase font-black border border-dashed border-white/10 rounded-3xl">Marca ejercicios en Config para que el Coach trabaje</div>`;
                return;
            }

            // Lógica: Si %grasa alto -> Priorizar cardio/calistenia de los activos. Si no, Fuerza.
            let objetivo = bodyComp.grasa > 21 ? 'calistenia' : 'fuerza';
            status.innerText = `Coach: Enfoque ${objetivo.toUpperCase()}`;

            let seleccion = pool.filter(t => t.t === objetivo).sort(() => 0.5 - Math.random()).slice(0, 3);
            if (seleccion.length === 0) seleccion = pool.slice(0, 3);

            seleccion.forEach(t => {
                const color = t.t === 'calistenia' ? 'border-blue-500' : (t.t === 'cardio' ? 'border-orange-500' : 'border-apple-green');
                container.innerHTML += `
                    <div class="apple-card border-l-4 ${color} py-5 flex justify-between items-center bg-white/[0.02]">
                        <div>
                            <h3 class="font-black text-xs uppercase italic">${t.n}</h3>
                            <p class="text-[9px] text-gray-500 font-bold uppercase mt-1">${t.t==='fuerza' ? t.w+'kg Base' : 'Peso Cuerpo'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[11px] font-black italic">4 x 12</p>
                        </div>
                    </div>`;
            });
        }

        // --- FUNCIONES CORE V29 ---
        function addDisc() {
            const w = parseFloat(document.getElementById('dw').value);
            const q = parseInt(document.getElementById('dq').value);
            if(w && q) { myDiscs.push({w, q}); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); renderDiscs(); }
        }

        function renderDiscs() {
            const cont = document.getElementById('lista-discos'); cont.innerHTML = '';
            myDiscs.forEach(d => { cont.innerHTML += `<div class="bg-white/5 border border-white/10 px-2 py-1 rounded text-[9px] font-bold">${d.q}x${d.w}kg</div>`; });
        }

        function addTool() {
            const n = document.getElementById('tn').value;
            const t = document.getElementById('tt').value;
            const w = parseFloat(document.getElementById('tw').value || 0);
            if(n) { 
                myTools.push({id: Date.now(), n, t, w, active: true}); 
                localStorage.setItem('myToolsV29', JSON.stringify(myTools)); 
                renderTools(); generarMision(); 
            }
        }

        function renderTools() {
            const cont = document.getElementById('lista-herramientas'); cont.innerHTML = '';
            myTools.forEach(t => {
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${t.active!==false?'checked':''} onchange="toggleToolStatus(${t.id})" class="w-4 h-4 accent-apple-green">
                            <span class="text-[10px] uppercase font-bold">${t.n}</span>
                        </div>
                        <button onclick="deleteTool(${t.id})" class="text-red-500 text-xs">✕</button>
                    </div>`;
            });
        }

        function toggleToolStatus(id) {
            const tool = myTools.find(t => t.id === id);
            tool.active = !tool.active;
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            generarMision();
        }

        function toggleEntreno() {
            if(!running) {
                running = true; pausado = false;
                document.getElementById('btn-start').innerText = "TERMINAR";
                document.getElementById('btn-start').classList.replace('bg-apple-green', 'bg-red-600');
                crono = setInterval(() => { if(!pausado) { seg++; updateDisp(); } }, 1000);
            } else {
                clearInterval(crono);
                history.push(new Date().toDateString());
                localStorage.setItem('trainingHistory', JSON.stringify(history));
                location.reload();
            }
        }

        function pausarEntreno() {
            pausado = !pausado;
            document.getElementById('btn-pause').innerText = pausado ? "REANUDAR" : "PAUSAR";
            document.getElementById('btn-pause').classList.toggle('bg-apple-green');
            document.getElementById('btn-pause').classList.toggle('text-black');
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        function saveTanita() {
            bodyComp.peso = document.getElementById('tan-p').value;
            bodyComp.grasa = document.getElementById('tan-g').value;
            bodyComp.musculo = document.getElementById('tan-m').value;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            generarMision();
            document.getElementById('drawer-tanita').classList.remove('drawer-open');
        }

        function deleteTool(id) { myTools = myTools.filter(t => t.id !== id); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); renderTools(); generarMision(); }

        window.onload = init;
    </script>
</body>
</html>
