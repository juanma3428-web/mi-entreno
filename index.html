<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Capa Inteligencia Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
        .drawer-open { max-height: 3000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .coach-border { border-left: 4px solid #30d158; }
        .rest-border { border-left: 4px solid #ffd60a; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <h1 class="text-xl font-black italic tracking-tighter uppercase">APPLE COACH <span class="text-apple-green">V29</span></h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('drawer-tanita').classList.toggle('drawer-open')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
            <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚙️</button>
        </div>
    </div>

    <div id="coach-section" class="mb-8">
        <div class="flex justify-between items-end mb-3 ml-2">
            <div>
                <p id="coach-label" class="text-[9px] text-apple-green font-black uppercase tracking-widest italic">Personal Trainer</p>
                <h2 id="coach-strategy" class="text-lg font-black italic uppercase tracking-tighter text-white">Analizando estado...</h2>
            </div>
            <button onclick="recalcularMision()" class="text-[8px] font-black text-gray-500 uppercase underline mb-1">Recalcular</button>
        </div>
        
        <div id="mision-diaria" class="space-y-3">
            </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-center mb-4">
            <div id="display" class="text-6xl timer-font italic">00:00</div>
            <div class="text-right">
                <span id="bpm-val" class="text-3xl font-bold text-red-500 tracking-tighter">--</span>
                <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest">BPM Live</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-principal" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic shadow-lg shadow-green-500/20">Confirmar e Iniciar Sesión</button>
            <button onclick="conectarPolar()" class="bg-white/5 text-white p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Polar H10</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black mb-2">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-3">Inventario de Discos (Unitario)</p>
            <div class="flex gap-2 mb-4">
                <input type="number" id="dw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs border border-white/5" placeholder="Peso (kg)">
                <input type="number" id="dq" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs border border-white/5" placeholder="Cant.">
                <button onclick="addDisc()" class="bg-apple-green text-black px-4 rounded-xl text-[10px] font-bold">Añadir</button>
            </div>
            <div id="lista-discos" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="apple-card bg-black">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-3">Base de Datos de Ejercicios</p>
            <input type="text" id="tn" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2 border border-white/5" placeholder="Nombre Ejercicio">
            <div class="flex gap-2 mb-4">
                <select id="tt" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs text-gray-400 border border-white/5">
                    <option value="fuerza">Fuerza</option>
                    <option value="calistenia">Calistenia</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="tw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs border border-white/5" placeholder="Peso Base">
            </div>
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-4 rounded-2xl font-black text-xs uppercase italic">Guardar en Sistema</button>
            <div id="lista-herramientas" class="mt-4 space-y-1"></div>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4">Sincronización Tanita-Pro</p>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <input type="number" id="tan-p" class="bg-[#1c1c1e] p-4 rounded-2xl text-center text-xs" placeholder="Peso">
                <input type="number" id="tan-g" class="bg-[#1c1c1e] p-4 rounded-2xl text-center text-xs" placeholder="% Grasa">
                <input type="number" id="tan-m" class="bg-[#1c1c1e] p-4 rounded-2xl text-center text-xs" placeholder="Músculo">
            </div>
            <button onclick="saveTanita()" class="w-full bg-apple-green text-black py-4 rounded-2xl font-black text-xs uppercase italic">Actualizar Métricas</button>
        </div>
    </div>

    <script>
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 35 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];

        function init() {
            renderDiscs();
            renderTools();
            generarMisionDinamica();
        }

        // --- MEJORA: CEREBRO DEL PERSONAL TRAINER ---
        function generarMisionDinamica() {
            const container = document.getElementById('mision-diaria');
            const strategyText = document.getElementById('coach-strategy');
            const label = document.getElementById('coach-label');
            container.innerHTML = '';

            // 1. Verificación Científica de Fatiga
            if (history.length >= 3) {
                label.innerText = "Coach: Modo Recuperación";
                label.classList.replace('text-apple-green', 'text-yellow-500');
                strategyText.innerText = "Descanso Activo / Supercompensación";
                container.innerHTML = `
                    <div class="apple-card rest-border py-8 text-center bg-yellow-500/5">
                        <span class="text-3xl mb-3 block">🛌</span>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Hoy tu cuerpo necesita reciclar lactato.</p>
                        <p class="text-[11px] text-white mt-2 font-medium">Sugerencia: 30 min de paseo ligero o movilidad articular.</p>
                        <button onclick="resetHistory()" class="mt-6 text-[8px] font-black text-gray-600 underline uppercase">Forzar nuevo ciclo</button>
                    </div>`;
                return;
            }

            // 2. Selección de Objetivo según Tanita
            let objetivo = "fuerza";
            if (bodyComp.grasa > 22) {
                objetivo = "calistenia";
                strategyText.innerText = "Déficit y Tonificación";
            } else {
                strategyText.innerText = "Hipertrofia y Potencia";
            }

            // 3. Filtrar y Barajar Ejercicios (Interactividad)
            let pool = myTools.filter(t => t.t === objetivo);
            if (pool.length < 3) pool = myTools; // Fallback si no hay suficientes

            let seleccion = [...pool].sort(() => 0.5 - Math.random()).slice(0, 3);

            if (seleccion.length === 0) {
                container.innerHTML = `<p class="text-center text-[9px] text-gray-600 uppercase p-10 border border-dashed border-white/10 rounded-3xl">Configura tus ejercicios para recibir una misión</p>`;
                return;
            }

            seleccion.forEach(t => {
                const isFuerza = t.t === 'fuerza';
                const detalle = isFuerza ? `Carga Sugerida: ${t.w}kg (Base)` : 'Carga: Peso Corporal';
                const color = t.t === 'calistenia' ? 'border-blue-500' : (t.t === 'cardio' ? 'border-orange-500' : 'border-apple-green');
                
                container.innerHTML += `
                    <div class="apple-card border-l-4 ${color} py-6 flex justify-between items-center bg-white/[0.02]">
                        <div>
                            <p class="text-[8px] text-gray-500 font-black uppercase mb-1">${t.t}</p>
                            <h3 class="font-black text-sm uppercase italic text-white">${t.n}</h3>
                            <p class="text-[10px] text-apple-green font-bold mt-1">${detalle}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[11px] font-black italic">4 x 12</p>
                            <p class="text-[8px] text-gray-600 font-black uppercase tracking-tighter">Series/Reps</p>
                        </div>
                    </div>`;
            });
        }

        function recalcularMision() {
            generarMisionDinamica();
        }

        // --- FUNCIONES V29 (INALTERADAS) ---
        function addDisc() {
            const w = parseFloat(document.getElementById('dw').value);
            const q = parseInt(document.getElementById('dq').value);
            if(w && q) { myDiscs.push({w, q}); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); renderDiscs(); }
        }

        function renderDiscs() {
            const cont = document.getElementById('lista-discos');
            cont.innerHTML = '';
            myDiscs.sort((a,b) => b.w - a.w).forEach(d => {
                cont.innerHTML += `<div class="bg-white/5 border border-white/10 px-3 py-2 rounded-xl text-[10px] font-black italic"><span class="text-apple-green">${d.q}x</span>${d.w}kg</div>`;
            });
        }

        function addTool() {
            const n = document.getElementById('tn').value;
            const t = document.getElementById('tt').value;
            const w = parseFloat(document.getElementById('tw').value || 0);
            if(n) { myTools.push({id: Date.now(), n, t, w}); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); renderTools(); generarMisionDinamica(); }
        }

        function renderTools() {
            const cont = document.getElementById('lista-herramientas');
            cont.innerHTML = '';
            myTools.forEach(t => {
                cont.innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-xl text-[10px] uppercase font-bold border border-white/[0.02]">
                    <span>${t.n} <span class="text-[8px] text-gray-500 italic ml-2">(${t.t})</span></span>
                    <button onclick="deleteTool(${t.id})" class="text-red-500 font-black">✕</button>
                </div>`;
            });
        }

        function deleteTool(id) {
            myTools = myTools.filter(t => t.id !== id);
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            init();
        }

        function saveTanita() {
            bodyComp.peso = document.getElementById('tan-p').value;
            bodyComp.grasa = document.getElementById('tan-g').value;
            bodyComp.musculo = document.getElementById('tan-m').value;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            location.reload();
        }

        function resetHistory() { history = []; localStorage.setItem('trainingHistory', '[]'); location.reload(); }

        let seg=0, crono=null, running=false;
        function toggleEntreno() {
            const btn = document.getElementById('btn-principal');
            if(!running) {
                running = true;
                btn.innerText = "FINALIZAR SESIÓN";
                btn.classList.replace('bg-apple-green', 'bg-red-600');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                clearInterval(crono);
                history.push(new Date().toDateString());
                localStorage.setItem('trainingHistory', JSON.stringify(history));
                location.reload();
            }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        window.onload = init;
    </script>
</body>
</html>
