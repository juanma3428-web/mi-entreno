<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Achievement Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .text-achievement-purple { color: #af52de; }
        .border-achievement-purple { border-color: #af52de; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .badge-anim { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p id="coach-status" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest italic">Personal Trainer Activo</p>
        </div>
        <div class="flex gap-2">
            <button id="btn-achievements" onclick="verLogros()" class="w-10 h-10 rounded-full bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-lg">🏆</button>
            <button onclick="document.getElementById('modal-tanita').classList.add('active')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-lg">⚖️</button>
        </div>
    </div>

    <div id="last-achievement" class="hidden">
        <div class="apple-card border-achievement-purple bg-purple-500/5 flex items-center gap-4 py-4 badge-anim">
            <span class="text-3xl">✨</span>
            <div>
                <h3 class="text-[10px] font-black text-achievement-purple uppercase tracking-widest">¡Nuevo Hito Alcanzado!</h3>
                <p id="achievement-text" class="text-xs font-bold italic"></p>
            </div>
        </div>
    </div>

    <div id="mision-container" class="space-y-3">
        </div>

    <div id="modal-logros" class="modal-overlay">
        <div class="w-[90%] max-w-sm bg-[#1c1c1e] p-6 rounded-3xl border border-purple-500/30">
            <h2 class="text-center text-xs font-black text-achievement-purple uppercase mb-6 italic tracking-widest">Salón de la Fama Biométrico</h2>
            <div id="lista-logros" class="space-y-3">
                </div>
            <button onclick="document.getElementById('modal-logros').classList.remove('active')" class="w-full mt-8 py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        // MEMORIA Y ESTADO V29
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 22, musculo: 34 };
        let records = JSON.parse(localStorage.getItem('biometricRecords')) || { minGrasa: 100, maxMusculo: 0 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];

        function init() {
            verificarLogros();
            planificarSesion();
        }

        function verificarLogros() {
            const lastAch = document.getElementById('last-achievement');
            const achText = document.getElementById('achievement-text');
            let huboLogro = false;

            // Comparar Grasa
            if (bodyComp.grasa < records.minGrasa && bodyComp.grasa > 0) {
                records.minGrasa = bodyComp.grasa;
                achText.innerText = `Has alcanzado tu mínimo histórico de grasa: ${bodyComp.grasa}%`;
                huboLogro = true;
            }
            // Comparar Músculo
            if (bodyComp.musculo > records.maxMusculo) {
                records.maxMusculo = bodyComp.musculo;
                achText.innerText = `Récord de masa muscular: ${bodyComp.musculo}kg. ¡Potencia máxima!`;
                huboLogro = true;
            }

            if (huboLogro) {
                localStorage.setItem('biometricRecords', JSON.stringify(records));
                lastAch.classList.remove('hidden');
            }
        }

        function planificarSesion() {
            const container = document.getElementById('mision-container');
            const status = document.getElementById('coach-status');
            
            // Lógica de Descanso (Mejora anterior integrada)
            if (history.length >= 3) {
                status.innerText = "Coach: Modo Recuperación";
                container.innerHTML = `<div class="apple-card border-l-4 border-yellow-500 py-10 text-center">
                    <h2 class="text-xl font-black italic text-yellow-500 uppercase">Descanso Activo</h2>
                    <p class="text-[10px] text-gray-400 mt-2 italic">Tu cuerpo está supercompensando. Camina 30 min.</p>
                </div>`;
                return;
            }

            // Lógica de Misión (Mejora Calistenia/Fuerza integrada)
            status.innerText = "Coach: Misión del Día Lista";
            let ejercicios = bodyComp.grasa > 20 
                ? myTools.filter(t => t.t === 'calistenia').slice(0,3)
                : myTools.filter(t => t.t === 'fuerza').slice(0,3);

            if(ejercicios.length === 0) {
                container.innerHTML = `<div class="apple-card p-6 text-center text-gray-500 text-[10px] font-bold uppercase">Añade ejercicios en Config para empezar</div>`;
                return;
            }

            ejercicios.forEach(tool => {
                const reps = bodyComp.musculo > 34 ? "12-15 reps" : "8-10 reps";
                container.innerHTML += `<div class="apple-card border-l-2 ${tool.t==='calistenia'?'border-blue-500':'border-apple-green'} py-5">
                    <h3 class="font-black text-xs uppercase italic">${tool.n}</h3>
                    <p class="text-[9px] text-gray-500 mt-1 uppercase">${tool.t==='calistenia'?'Peso Corporal':'Con Discos'} | ${reps}</p>
                </div>`;
            });
        }

        function verLogros() {
            const lista = document.getElementById('lista-logros');
            lista.innerHTML = `
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 uppercase font-black">Mínima Grasa Histórica</p>
                    <p class="text-xl font-bold text-achievement-purple italic">${records.minGrasa}%</p>
                </div>
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 uppercase font-black">Máximo Músculo Logrado</p>
                    <p class="text-xl font-bold text-apple-green italic">${records.maxMusculo}kg</p>
                </div>
            `;
            document.getElementById('modal-logros').classList.add('active');
        }

        function guardarTanita() {
            bodyComp.peso = parseFloat(document.getElementById('tanita-peso').value);
            bodyComp.grasa = parseFloat(document.getElementById('tanita-grasa').value);
            bodyComp.musculo = parseFloat(document.getElementById('tanita-musculo').value);
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            location.reload(); // Recarga para activar lógica de logros
        }

        window.onload = init;
    </script>
</body>
</html>
