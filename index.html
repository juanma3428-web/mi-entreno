<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V26 - Inventario de Discos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 2000px; }
        .chip-container { display: flex; align-items: center; background: #2c2c2e; border-radius: 12px; overflow: hidden; margin-bottom: 6px; border: 1px solid transparent; }
        .chip-container.active { border-color: #30d158; }
        .chip-label { flex: 1; padding: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .chip-container.active .chip-label { background: #30d158; color: #000; }
        .btn-del { padding: 12px; color: #ff3b30; font-weight: bold; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .btn-esfuerzo { width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; text-transform: uppercase; font-size: 11px; margin-bottom: 8px; }
    </style>
</head>
<body class="p-4 pb-32 text-white">

    <div id="modal-feedback" class="modal-overlay">
        <div class="w-[90%] max-w-sm text-center">
            <h2 class="text-2xl font-black mb-2 italic">¿Cómo fue el esfuerzo?</h2>
            <button onclick="procesarFeedback(-4)" class="btn-esfuerzo bg-red-600/20 text-red-500 border border-red-500/30">🥵 AGOTADOR (-4kg)</button>
            <button onclick="procesarFeedback(-2)" class="btn-esfuerzo bg-orange-600/20 text-orange-500 border border-orange-500/30">🔥 DURO (-2kg)</button>
            <button onclick="procesarFeedback(0)" class="btn-esfuerzo bg-blue-600/20 text-blue-400 border border-blue-500/30">👍 NORMAL (Mantener)</button>
            <button onclick="procesarFeedback(2)" class="btn-esfuerzo bg-green-600/20 text-apple-green border border-apple-green/30">✨ SUAVE (+2kg mañana)</button>
        </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Polar H10 Live</p>
                <div class="flex items-baseline gap-1">
                    <span id="bpm-val" class="text-6xl font-bold tracking-tighter">--</span>
                    <span class="text-red-500 font-bold text-sm italic">BPM</span>
                </div>
            </div>
            <button onclick="conectarPolar()" class="w-12 h-12 rounded-full bg-red-600/10 flex items-center justify-center text-xl">❤️</button>
        </div>
    </div>

    <div class="apple-card text-center">
        <div id="display" class="text-7xl timer-font mb-8 italic">00:00</div>
        <div class="flex gap-4">
            <button id="btn-pausa" onclick="pausar()" class="w-16 h-16 rounded-full bg-yellow-500/10 flex items-center justify-center opacity-20" disabled>
                <span id="pause-icon" class="text-yellow-500 text-xl font-bold">||</span>
            </button>
            <button id="btn-principal" onclick="toggleEntreno()" class="flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase tracking-widest italic">Iniciar Sesión</button>
        </div>
    </div>

    <div class="apple-card">
        <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-full flex justify-between items-center">
            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Inventario y Discos</span>
            <span class="text-apple-green text-xs font-bold italic">Configurar</span>
        </button>
        <div id="equip-drawer" class="drawer">
            <div class="mt-4 p-4 bg-white/5 rounded-2xl mb-4 border border-white/5">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-3 italic tracking-widest">Añadir Discos (Pack)</p>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="number" id="disc-weight" class="bg-black border border-white/10 rounded-xl p-3 text-xs" placeholder="Peso Disco (kg)">
                    <input type="number" id="disc-qty" class="bg-black border border-white/10 rounded-xl p-3 text-xs" placeholder="Nº de Discos">
                </div>
                <button onclick="addDiscs()" class="w-full bg-white/10 text-white py-3 rounded-xl font-black text-[10px] uppercase mb-4">Añadir Discos al Gimnasio</button>
                <hr class="border-white/5 mb-4">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-3 italic tracking-widest">Añadir Ejercicio</p>
                <input type="text" id="new-tool-name" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs mb-2" placeholder="Nombre (Ej: Press Banca)">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <select id="new-tool-type" class="bg-black border border-white/10 rounded-xl p-3 text-xs text-gray-400">
                        <option value="fuerza">Fuerza</option>
                        <option value="cardio">Cardio</option>
                    </select>
                    <input type="number" id="new-tool-weight" class="bg-black border border-white/10 rounded-xl p-3 text-xs" placeholder="Peso Base (kg)">
                </div>
                <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Añadir Herramienta</button>
            </div>
            <div id="lista-discos" class="mb-4"></div>
            <div id="lista-equip"></div>
        </div>
    </div>

    <div class="px-2 mb-4">
        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Carga Real Sugerida (Domyos BM 490)</h2>
        <p id="coach-reason" class="text-[11px] text-apple-green italic mt-1 font-medium"></p>
    </div>
    <div id="contenedor-rutina" class="space-y-3"></div>

    <script>
        let seg=0, crono = null, running=false, paused=false;
        let myTools = JSON.parse(localStorage.getItem('myToolsV26')) || [
            {id: 1, n: "Press Banca (BM490)", t: "fuerza", w: 20},
            {id: 2, n: "Jalón Pecho (Polea)", t: "fuerza", w: 20}
        ];
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV26')) || [
            {w: 5, q: 4}, {w: 2, q: 4}, {w: 1, q: 2}
        ];
        let globalWeightAdjust = parseFloat(localStorage.getItem('globalWeightAdjust')) || 0;

        function init() { renderTools(); renderDiscs(); generarRutinaInteligente(); }

        // Lógica de cálculo de combinación de discos
        function calcularCombinacion(pesoObjetivo) {
            let restante = pesoObjetivo;
            let combinacion = [];
            // Ordenar discos de mayor a menor peso
            const discosSorted = [...myDiscs].sort((a,b) => b.w - a.w);
            
            discosSorted.forEach(d => {
                let usar = Math.min(d.q, Math.floor(restante / d.w));
                if (usar > 0) {
                    combinacion.push(`${usar}x${d.w}kg`);
                    restante -= (usar * d.w);
                }
            });
            return { real: pesoObjetivo - restante, texto: combinacion.join(' + ') };
        }

        function generarRutinaInteligente() {
            const cont = document.getElementById('contenedor-rutina');
            cont.innerHTML = '';
            const activas = myTools.filter(t => localStorage.getItem('e_'+t.n) === 'true');
            if(activas.length === 0) return;

            const ultimaSesion = localStorage.getItem('tipo_ultima_sesion');
            let tipoHoy = (ultimaSesion === 'fuerza') ? 'cardio' : 'fuerza';
            
            document.getElementById('coach-reason').innerText = tipoHoy === 'cardio' ? "Cardio activo." : "Fuerza con discos disponibles.";

            activas.filter(t => t.t === tipoHoy).slice(0, 3).forEach(tool => {
                let sugerencia = "";
                if(tool.t === 'fuerza') {
                    const pesoIdeal = Math.max(0, tool.w + globalWeightAdjust);
                    const calc = calcularCombinacion(pesoIdeal);
                    sugerencia = `Carga: ${calc.real}kg<br><span class="text-gray-500 italic text-[9px] uppercase font-bold">Montaje: ${calc.texto || 'Sin discos'}</span>`;
                } else {
                    sugerencia = "35 min ritmo constante.";
                }

                cont.innerHTML += `
                    <div class="apple-card border-l-2 border-apple-green flex justify-between items-center py-5">
                        <div class="flex-1">
                            <h3 class="font-black text-xs uppercase italic tracking-tight">${tool.n}</h3>
                            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1 leading-tight">${sugerencia}</p>
                        </div>
                        <button onclick="completarEj('`+tool.t+`')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-black text-[10px] text-apple-green uppercase">Log</button>
                    </div>`;
            });
        }

        function addDiscs() {
            const w = parseFloat(document.getElementById('disc-weight').value);
            const q = parseInt(document.getElementById('disc-qty').value);
            if(w > 0 && q > 0) {
                myDiscs.push({ w, q });
                localStorage.setItem('myDiscsV26', JSON.stringify(myDiscs));
                renderDiscs(); generarRutinaInteligente();
            }
        }

        function renderDiscs() {
            const cont = document.getElementById('lista-discos');
            cont.innerHTML = '<p class="text-[9px] font-black text-gray-500 uppercase mb-2">Mis Discos:</p>';
            myDiscs.forEach((d, i) => {
                cont.innerHTML += `<span class="inline-block bg-white/10 px-2 py-1 rounded-md text-[9px] font-bold mr-1 mb-1">${d.q} x ${d.w}kg <button onclick="removeDisc(${i})" class="text-red-500 ml-1">✕</button></span>`;
            });
        }

        function removeDisc(i) { myDiscs.splice(i, 1); localStorage.setItem('myDiscsV26', JSON.stringify(myDiscs)); renderDiscs(); generarRutinaInteligente(); }

        // Funciones del Cronómetro (Estabilizadas V24)
        function toggleEntreno() {
            if (!running) {
                running = true; paused = false;
                document.getElementById('btn-principal').innerText = "FINALIZAR";
                document.getElementById('btn-principal').className = "flex-1 bg-red-600 text-white rounded-2xl font-black text-sm uppercase italic";
                document.getElementById('btn-pausa').disabled = false; document.getElementById('btn-pausa').classList.remove('opacity-20');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                clearInterval(crono); crono = null;
                document.getElementById('modal-feedback').classList.add('active');
            }
        }

        function pausar() {
            const icon = document.getElementById('pause-icon');
            if (!paused) { paused = true; clearInterval(crono); crono = null; icon.innerText = "▶"; }
            else { paused = false; icon.innerText = "||"; crono = setInterval(() => { seg++; updateDisp(); }, 1000); }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        function procesarFeedback(kg) {
            globalWeightAdjust += kg; localStorage.setItem('globalWeightAdjust', globalWeightAdjust);
            running = false; seg = 0; updateDisp();
            document.getElementById('modal-feedback').classList.remove('active');
            document.getElementById('btn-principal').innerText = "INICIAR SESIÓN";
            document.getElementById('btn-principal').className = "flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase italic";
            generarRutinaInteligente();
        }

        function addTool() {
            const n = document.getElementById('new-tool-name').value;
            const t = document.getElementById('new-tool-type').value;
            const w = parseFloat(document.getElementById('new-tool-weight').value || 0);
            if(n) {
                myTools.push({ id: Date.now(), n, t, w });
                localStorage.setItem('myToolsV26', JSON.stringify(myTools));
                localStorage.setItem('e_'+n, 'true');
                renderTools(); generarRutinaInteligente();
            }
        }

        function renderTools() {
            const cont = document.getElementById('lista-equip'); cont.innerHTML = '';
            myTools.forEach(tool => {
                const act = localStorage.getItem('e_'+tool.n) === 'true';
                cont.innerHTML += `<div class="chip-container ${act?'active':''}">
                    <div class="chip-label" onclick="toggleTool('${tool.n}')">${tool.n} <span class="opacity-40 text-[8px]">(${tool.w}kg base)</span></div>
                    <button onclick="deleteTool(${tool.id})" class="btn-del text-xs">✕</button></div>`;
            });
        }
        function toggleTool(name) { localStorage.setItem('e_'+name, localStorage.getItem('e_'+name) !== 'true'); init(); }
        function deleteTool(id) { myTools = myTools.filter(t => t.id !== id); localStorage.setItem('myToolsV26', JSON.stringify(myTools)); init(); }
        function completarEj(tipo) { localStorage.setItem('tipo_ultima_sesion', tipo); generarRutinaInteligente(); }

        init();
    </script>
</body>
</html>
