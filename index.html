<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach Pro - V20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 1000px; }
        .chip-container { display: flex; align-items: center; background: #2c2c2e; border-radius: 12px; overflow: hidden; margin-bottom: 4px; }
        .chip-container.active { border: 1px solid #30d158; }
        .chip-label { flex: 1; padding: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .chip-container.active .chip-label { background: #30d158; color: #000; }
        .btn-del { padding: 12px; color: #ff3b30; font-weight: bold; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-start mb-4">
            <div>
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Polar H10 Connected</p>
                <div class="flex items-baseline gap-1">
                    <span id="bpm-val" class="text-6xl font-bold tracking-tighter">--</span>
                    <span class="text-red-500 font-bold text-sm">BPM</span>
                </div>
            </div>
            <button onclick="conectarPolar()" class="w-12 h-12 rounded-full bg-red-600/10 flex items-center justify-center text-xl">❤️</button>
        </div>
        <div class="flex justify-between font-bold border-t border-white/5 pt-4">
            <div id="kcal-val" class="text-2xl text-orange-500">0 <span class="text-xs">KCAL</span></div>
            <div id="session-time" class="text-2xl">0:00</div>
        </div>
    </div>

    <div class="apple-card">
        <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-full flex justify-between items-center">
            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Mis Herramientas</span>
            <span class="text-apple-green text-xs font-bold italic">Editar Inventario</span>
        </button>
        <div id="equip-drawer" class="drawer">
            <div class="mt-4 p-4 bg-white/5 rounded-2xl mb-4">
                <input type="text" id="new-tool-name" class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs mb-2" placeholder="Nombre de herramienta...">
                <div class="flex gap-2">
                    <select id="new-tool-type" class="flex-1 bg-black border border-white/10 rounded-xl p-3 text-xs text-gray-400">
                        <option value="fuerza">Tipo: Fuerza</option>
                        <option value="cardio">Tipo: Cardio</option>
                    </select>
                    <button onclick="addTool()" class="bg-apple-green text-black px-6 rounded-xl font-black text-xs uppercase">Añadir</button>
                </div>
            </div>
            <div id="lista-equip"></div>
        </div>
    </div>

    <div class="apple-card text-center">
        <div id="display" class="text-7xl timer-font mb-8">00:00</div>
        <div class="flex gap-4">
            <button id="btn-pausa" onclick="pausar()" class="w-16 h-16 rounded-full bg-yellow-500/10 flex items-center justify-center opacity-20" disabled>
                <span id="pause-icon" class="text-yellow-500 text-xl font-bold">||</span>
            </button>
            <button id="btn-principal" onclick="toggleEntreno()" class="flex-1 bg-apple-green text-black rounded-2xl font-black text-sm uppercase tracking-widest italic">Iniciar Sesión</button>
        </div>
    </div>

    <div class="px-2 mb-4">
        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Sugerencia del Coach</h2>
        <p id="coach-reason" class="text-[11px] text-apple-green italic mt-1 font-medium"></p>
    </div>
    <div id="contenedor-rutina" class="space-y-3"></div>

    <script>
        let seg=0, crono, running=false, paused=false, kcal=0;
        
        // 1. Base de datos de herramientas (Persistente)
        let myTools = JSON.parse(localStorage.getItem('myToolsV20')) || [
            {id: 1, n: "Multiestación", t: "fuerza"},
            {id: 2, n: "Rodillo de rulos", t: "cardio"},
            {id: 3, n: "Cinta correr", t: "cardio"},
            {id: 4, n: "Mancuernas", t: "fuerza"}
        ];

        function init() {
            renderTools();
            generarRutinaInteligente();
        }

        // 2. Motor de Inteligencia de Rutina
        function generarRutinaInteligente() {
            const cont = document.getElementById('contenedor-rutina');
            const reason = document.getElementById('coach-reason');
            cont.innerHTML = '';

            const activas = myTools.filter(t => localStorage.getItem('e_'+t.n) === 'true');
            if(activas.length === 0) {
                reason.innerText = "Activa herramientas para empezar.";
                return;
            }

            // Lógica de periodización basada en el último entreno guardado
            const ultimaSesion = localStorage.getItem('tipo_ultima_sesion');
            let tipoHoy = (ultimaSesion === 'fuerza') ? 'cardio' : 'fuerza';
            
            reason.innerText = (tipoHoy === 'cardio') 
                ? "Ayer trabajamos fuerza. Hoy toca sesión aeróbica para quemar y recuperar." 
                : "Hoy nos enfocaremos en potenciar la masa muscular y fuerza base.";

            // Filtramos herramientas del tipo que toca hoy
            let seleccionadas = activas.filter(t => t.t === tipoHoy);
            
            // Si no hay herramientas del tipo que toca, usamos lo que haya
            if(seleccionadas.length === 0) seleccionadas = activas;

            seleccionadas.slice(0, 3).forEach(tool => {
                let sugerencia = (tool.t === 'cardio') 
                    ? "30-40 min a 130-140 BPM (Zona 2)" 
                    : "4 Series de 8-10 reps (Carga Pesada)";

                cont.innerHTML += `
                    <div class="apple-card border-l-2 border-apple-green flex justify-between items-center py-5">
                        <div class="flex-1">
                            <h3 class="font-black text-xs uppercase italic tracking-tight">${tool.n}</h3>
                            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">${sugerencia}</p>
                        </div>
                        <button onclick="completarEj('`+tool.t+`')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-black text-[10px] uppercase text-apple-green">Log</button>
                    </div>`;
            });
        }

        function completarEj(tipo) {
            localStorage.setItem('tipo_ultima_sesion', tipo);
            alert("Buen trabajo. El Coach ha anotado el progreso.");
            generarRutinaInteligente();
        }

        // 3. Gestión de Inventario
        function renderTools() {
            const cont = document.getElementById('lista-equip');
            cont.innerHTML = '';
            myTools.forEach(tool => {
                const act = localStorage.getItem('e_'+tool.n) === 'true';
                cont.innerHTML += `
                    <div class="chip-container ${act?'active':''}">
                        <div class="chip-label" onclick="toggleTool('${tool.n}')">${tool.n} <span class="opacity-50 text-[8px] ml-1">(${tool.t})</span></div>
                        <button onclick="deleteTool(${tool.id})" class="btn-del text-xs">✕</button>
                    </div>`;
            });
        }

        function addTool() {
            const name = document.getElementById('new-tool-name').value.trim();
            const type = document.getElementById('new-tool-type').value;
            if(name) {
                const newTool = { id: Date.now(), n: name, t: type };
                myTools.push(newTool);
                localStorage.setItem('myToolsV20', JSON.stringify(myTools));
                localStorage.setItem('e_'+name, 'true');
                document.getElementById('new-tool-name').value = '';
                renderTools();
                generarRutinaInteligente();
            }
        }

        function deleteTool(id) {
            myTools = myTools.filter(t => t.id !== id);
            localStorage.setItem('myToolsV20', JSON.stringify(myTools));
            renderTools();
            generarRutinaInteligente();
        }

        function toggleTool(name) {
            const val = localStorage.getItem('e_'+name) === 'true';
            localStorage.setItem('e_'+name, !val);
            renderTools();
            generarRutinaInteligente();
        }

        // 4. Lógica de Sesión y Polar
        async function conectarPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const v = e.target.value.getUint8(1);
                    document.getElementById('bpm-val').innerText = v;
                    kcal += (v * 0.012);
                    document.getElementById('kcal-val').innerHTML = `${Math.floor(kcal)} <span class="text-xs">KCAL</span>`;
                });
            } catch (e) { console.log(e); }
        }

        function toggleEntreno() {
            const btn = document.getElementById('btn-principal'), pBtn = document.getElementById('btn-pausa');
            if (!running) {
                running = true; btn.innerText = "FINALIZAR"; btn.classList.replace('bg-apple-green','bg-red-600'); btn.classList.replace('text-black','text-white');
                pBtn.disabled = false; pBtn.classList.remove('opacity-20');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                running = false; clearInterval(crono);
                btn.innerText = "INICIAR"; btn.classList.replace('bg-red-600','bg-apple-green'); btn.classList.replace('text-white','text-black');
                pBtn.disabled = true; pBtn.classList.add('opacity-20');
            }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            const t = `${m}:${s.toString().padStart(2,'0')}`;
            document.getElementById('display').innerText = t;
            document.getElementById('session-time').innerText = t;
        }

        function pausar() {
            const icon = document.getElementById('pause-icon');
            if (!paused) { paused=true; clearInterval(crono); icon.innerText = "▶"; }
            else { paused=false; crono = setInterval(() => { seg++; updateDisp(); }, 1000); icon.innerText = "||"; }
        }

        init();
    </script>
</body>
</html>
