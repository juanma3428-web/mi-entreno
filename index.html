<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Personal Trainer Capa Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
        .drawer-open { max-height: 2000px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p id="coach-logic" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest italic">Analizando Evidencia Científica...</p>
        </div>
        <button onclick="document.getElementById('modal-tanita').classList.add('active')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
    </div>

    <div id="personal-trainer-zone" class="mb-8">
        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4 ml-2 italic">Misión Sugerida para Hoy</h2>
        <div id="mision-container" class="space-y-3">
            </div>
        <button onclick="generarAlternativa()" class="mt-4 w-full py-2 text-[9px] font-black text-gray-600 uppercase tracking-widest border border-white/5 rounded-xl">Pedir otra sugerencia</button>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-center mb-4">
            <div id="display" class="text-6xl timer-font italic">00:00</div>
            <div id="bpm-val" class="text-2xl font-bold text-red-500 tracking-tighter">--</div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-principal" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic">Confirmar e Iniciar</button>
            <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="bg-white/5 p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Config</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="mt-4 p-5 bg-[#1c1c1e] rounded-[30px] border border-white/5">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-4 italic">Añadir Ejercicio / Inventario</p>
            <input type="text" id="t-n" class="w-full bg-black p-4 rounded-xl text-xs mb-2" placeholder="Nombre (Ej: Press Banca)">
            <select id="t-t" class="w-full bg-black p-4 rounded-xl text-xs mb-2 text-gray-400">
                <option value="fuerza">Fuerza (Discos)</option>
                <option value="calistenia">Calistenia (Peso Corporal)</option>
                <option value="cardio">Cardio</option>
            </select>
            <input type="number" id="t-w" class="w-full bg-black p-4 rounded-xl text-xs mb-4" placeholder="Peso Base (kg)">
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-4 rounded-2xl font-black text-xs uppercase italic">Guardar en V29</button>
            <div id="lista-tools" class="mt-6 space-y-2"></div>
        </div>
    </div>

    <script>
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20 };
        let seg=0, crono=null, running=false;

        function init() {
            seleccionarMisionCientifica();
            renderToolsList();
        }

        // MEJORA: LÓGICA DE SELECCIÓN INTERACTIVA
        function seleccionarMisionCientifica() {
            const container = document.getElementById('mision-container');
            const status = document.getElementById('coach-logic');
            container.innerHTML = '';

            // 1. Verificar fatiga científica
            if (history.length >= 4) {
                status.innerText = "Coach: Recuperación Obligatoria";
                container.innerHTML = `<div class="apple-card border-l-4 border-yellow-500 py-8 text-center">
                    <p class="text-xl">🛌</p>
                    <h3 class="text-xs font-black uppercase text-yellow-500 mt-2">Día de Descanso Activo</h3>
                    <p class="text-[10px] text-gray-500 mt-1">Tu sistema nervioso central necesita 24h de cese.</p>
                </div>`;
                return;
            }

            // 2. Crear Tabla Personalizada (No listado genérico)
            // Filtramos para no repetir lo mismo que ayer y según la Tanita
            let sugeridos = [];
            if (bodyComp.grasa > 22) {
                sugeridos = myTools.filter(t => t.t === 'calistenia' || t.t === 'cardio').slice(0, 3);
                status.innerText = "Coach: Enfoque Quema Metabólica";
            } else {
                sugeridos = myTools.filter(t => t.t === 'fuerza').slice(0, 3);
                status.innerText = "Coach: Enfoque Hipertrofia";
            }

            if(sugeridos.length === 0) {
                container.innerHTML = `<p class="text-center text-[9px] text-gray-600 uppercase p-10">Añade ejercicios en Config para que el Coach diseñe tu tabla</p>`;
                return;
            }

            sugeridos.forEach(tool => {
                const color = tool.t === 'calistenia' ? 'border-blue-500' : (tool.t === 'cardio' ? 'border-orange-500' : 'border-apple-green');
                container.innerHTML += `
                    <div class="apple-card border-l-2 ${color} py-5 flex justify-between items-center">
                        <div>
                            <h3 class="font-black text-xs uppercase italic text-white">${tool.n}</h3>
                            <p class="text-[9px] text-gray-500 font-bold uppercase mt-1">
                                ${tool.t === 'fuerza' ? 'Carga: ' + tool.w + 'kg' : 'Peso Corporal'} | 4 Sets
                            </p>
                        </div>
                        <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">${tool.t}</span>
                    </div>`;
            });
        }

        function generarAlternativa() {
            // Re-baraja la selección para dar interactividad
            myTools.sort(() => Math.random() - 0.5);
            seleccionarMisionCientifica();
        }

        // FUNCIONES CORE V29
        function addTool() {
            const n = document.getElementById('t-n').value;
            const t = document.getElementById('t-t').value;
            const w = parseFloat(document.getElementById('t-w').value || 0);
            if(n) {
                myTools.push({id: Date.now(), n, t, w});
                localStorage.setItem('myToolsV29', JSON.stringify(myTools));
                location.reload();
            }
        }

        function renderToolsList() {
            const list = document.getElementById('lista-tools');
            list.innerHTML = '';
            myTools.forEach(t => {
                list.innerHTML += `<div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                    <span class="text-[9px] font-bold uppercase">${t.n}</span>
                    <button onclick="deleteTool(${t.id})" class="text-red-500 text-xs font-black">✕</button>
                </div>`;
            });
        }

        function deleteTool(id) {
            myTools = myTools.filter(t => t.id !== id);
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            init();
        }

        function toggleEntreno() {
            if(!running) {
                running = true;
                document.getElementById('btn-principal').innerText = "FINALIZAR";
                document.getElementById('btn-principal').classList.replace('bg-apple-green', 'bg-red-600');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                clearInterval(crono);
                history.push(new Date().toDateString());
                localStorage.setItem('trainingHistory', JSON.stringify(history));
                location.reload();
            }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        window.onload = init;
    </script>
</body>
</html>
