<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Personal Trainer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 2000px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .input-tanita { background: #000; border: 1px solid #2c2c2e; border-radius: 12px; padding: 12px; text-align: center; color: white; width: 100%; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter italic">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p id="coach-status" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Calculando Plan Biométrico...</p>
        </div>
        <button onclick="document.getElementById('modal-tanita').classList.add('active')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
    </div>

    <div class="mb-4">
        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-3 ml-2 italic">Entrenamiento para Hoy</h2>
        <div id="mision-diaria" class="space-y-3">
            </div>
    </div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-center">
            <div id="bpm-val" class="text-5xl font-bold tracking-tighter">-- <span class="text-xs text-red-500">BPM</span></div>
            <div id="display" class="text-5xl timer-font italic">00:00</div>
        </div>
        <div class="flex gap-2 mt-4">
            <button id="btn-polar" onclick="conectarPolar()" class="bg-white/5 p-3 rounded-xl text-xs font-black uppercase flex-1 border border-white/5">Conectar Polar</button>
            <button onclick="toggleEntreno()" id="btn-principal" class="bg-apple-green text-black p-3 rounded-xl text-xs font-black uppercase flex-[2] italic">Iniciar Sesión</button>
        </div>
    </div>

    <div class="apple-card">
        <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="w-full flex justify-between items-center">
            <span class="text-[9px] font-black text-gray-600 uppercase italic">Gestión de Herramientas y Discos</span>
            <span class="text-apple-green text-[10px] font-black font-black uppercase">Config</span>
        </button>
        <div id="equip-drawer" class="drawer">
            <div class="mt-4 p-4 bg-black rounded-2xl border border-white/5">
                <input type="text" id="new-tool-name" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2" placeholder="Nombre Ejercicio">
                <select id="new-tool-type" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2 text-gray-400">
                    <option value="fuerza">Fuerza (Discos)</option>
                    <option value="calistenia">Calistenia (Cuerpo)</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="new-tool-weight" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-4" placeholder="Peso Base (kg)">
                <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic">Añadir a Memoria</button>
            </div>
            <div id="lista-equip" class="mt-4 space-y-1"></div>
        </div>
    </div>

    <div id="modal-feedback" class="modal-overlay">
        <div class="w-[85%] bg-[#1c1c1e] p-6 rounded-3xl text-center border border-white/10">
            <h2 class="text-xl font-black mb-6 italic uppercase tracking-tighter">¿Cómo fue la intensidad?</h2>
            <button onclick="finalizarCoach(-2)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-orange-600/20 text-orange-500 border border-orange-500/30">Duro (Ajustar -2kg)</button>
            <button onclick="finalizarCoach(0)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-blue-600/20 text-blue-400 border border-blue-500/30">Normal (Mantener)</button>
            <button onclick="finalizarCoach(2)" class="w-full p-4 rounded-2xl mb-2 font-bold uppercase text-[10px] bg-green-600/20 text-apple-green border border-apple-green/30">Suave (Subir +2kg)</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS V29 ---
        let seg=0, crono=null, running=false;
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75.0, grasa: 22.0, musculo: 34.0 };
        let globalWeightAdjust = parseFloat(localStorage.getItem('globalWeightAdjust')) || 0;

        // --- CEREBRO DEL ENTRENADOR PERSONAL ---
        function planificarSesion() {
            const mision = document.getElementById('mision-diaria');
            const status = document.getElementById('coach-status');
            mision.innerHTML = '';
            
            // 1. Decisión Estratégica
            let enfoque = "";
            let ejerciciosSeleccionados = [];

            if(bodyComp.grasa > 21) {
                enfoque = "QUEMA Y DEFINICIÓN";
                // Filtramos 2 de cardio/calistenia y 1 de fuerza
                ejerciciosSeleccionados = [
                    ...myTools.filter(t => t.t === 'cardio').slice(0,1),
                    ...myTools.filter(t => t.t === 'calistenia').slice(0,2),
                    ...myTools.filter(t => t.t === 'fuerza').slice(0,1)
                ];
            } else {
                enfoque = "CONSTRUCCIÓN MUSCULAR";
                // Prioridad Fuerza
                ejerciciosSeleccionados = [
                    ...myTools.filter(t => t.t === 'fuerza').slice(0,3),
                    ...myTools.filter(t => t.t === 'calistenia').slice(0,1)
                ];
            }

            status.innerText = `Coach: Enfoque ${enfoque}`;

            // 2. Renderizado de la Misión
            ejerciciosSeleccionados.forEach(tool => {
                let info = "";
                let reps = bodyComp.musculo < 33 ? "8-10 (Carga Alta)" : "12-15 (Volumen)";
                let color = "border-apple-green";

                if(tool.t === 'fuerza') {
                    let pesoCalculado = tool.w + globalWeightAdjust;
                    info = `Carga: ${pesoCalculado}kg | Directriz: 4 x ${reps}`;
                } else if(tool.t === 'calistenia') {
                    info = `Peso: ${bodyComp.peso}kg | Directriz: Al fallo técnico`;
                    color = "border-blue-500";
                } else {
                    info = `Tiempo: 40 min | Ritmo: Zona 2`;
                    color = "border-orange-500";
                }

                mision.innerHTML += `
                    <div class="apple-card border-l-2 ${color} py-4">
                        <h3 class="text-xs font-black uppercase italic">${tool.n}</h3>
                        <p class="text-[9px] text-gray-500 font-bold mt-1 uppercase tracking-tighter">${info}</p>
                    </div>`;
            });
        }

        // --- FUNCIONES DE SESIÓN (RESPETANDO V29) ---
        function toggleEntreno() {
            if(!running) {
                running = true;
                document.getElementById('btn-principal').innerText = "FINALIZAR";
                document.getElementById('btn-principal').classList.replace('bg-apple-green', 'bg-red-600');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                document.getElementById('modal-feedback').classList.add('active');
            }
        }

        function finalizarCoach(adj) {
            globalWeightAdjust += adj;
            localStorage.setItem('globalWeightAdjust', globalWeightAdjust);
            // Guardamos que hoy se entrenó para que mañana el Coach cambie el plan
            localStorage.setItem('ultima_sesion', new Date().toDateString());
            location.reload();
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        // ... (Funciones de Polar, Discos y Tools se mantienen igual que en V29) ...
        function addTool() {
            const n = document.getElementById('new-tool-name').value;
            const t = document.getElementById('new-tool-type').value;
            const w = parseFloat(document.getElementById('new-tool-weight').value || 0);
            if(n) {
                myTools.push({id: Date.now(), n, t, w});
                localStorage.setItem('myToolsV29', JSON.stringify(myTools));
                planificarSesion();
            }
        }

        window.onload = () => {
            planificarSesion();
            renderTools();
        };

        function renderTools() {
            const cont = document.getElementById('lista-equip'); cont.innerHTML = '';
            myTools.forEach(tool => {
                cont.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl mb-1">
                    <span class="text-[10px] font-bold uppercase">${tool.n}</span>
                    <button onclick="deleteTool(${tool.id})" class="text-red-500 text-xs">✕</button>
                </div>`;
            });
        }
        function deleteTool(id) {
            myTools = myTools.filter(t => t.id !== id);
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            location.reload();
        }
    </script>
</body>
</html>
