<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APPLE COACH V30 - Aesthetic Adjustment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; width: 100%; box-sizing: border-box; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 3000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #mision-container { min-height: 50px; display: block !important; opacity: 1 !important; }
        
        /* AJUSTE ESTÉTICO EXCLUSIVO: Previene el desbordamiento horizontal en inputs */
        input[type="number"], select, input[type="text"] {
            width: 100%;
            box-sizing: border-box !important;
        }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="feedback-modal" class="modal-overlay">
        <div class="apple-card w-full border-apple-green">
            <h2 class="text-lg font-black italic uppercase mb-2 text-apple-green">Sesión Completada</h2>
            <p id="resumen-sesion" class="text-[10px] text-gray-400 uppercase font-bold mb-6 italic"></p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="saveFeedback(0.8)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic text-white">Muy Ligero (Subir carga)</button>
                <button onclick="saveFeedback(1.0)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic text-apple-green">Intensidad Óptima</button>
                <button onclick="saveFeedback(1.3)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic text-white">Demasiado Duro (Bajar carga)</button>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">APPLE COACH <span class="text-apple-green">V30</span></h1>
            <p class="text-[8px] text-gray-500 font-black uppercase tracking-widest italic">Inteligencia BM 450 + Polar H10</p>
        </div>
        <div class="flex gap-2 text-white">
            <button onclick="toggleDrawer('drawer-tanita')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
            <button onclick="toggleDrawer('equip-drawer')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚙️</button>
        </div>
    </div>

    <div id="mision-container" class="space-y-3 mb-8"></div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-start mb-4">
            <div>
                <div id="display" class="text-6xl timer-font italic">00:00</div>
                <div class="flex items-center gap-2 mt-1">
                    <span id="kcal-val" class="text-lg font-bold text-orange-500 tracking-tighter">0</span>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Kcal Est.</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span id="bpm-val" class="text-4xl font-bold text-red-500 tracking-tighter text-white">--</span>
                    <button onclick="connectPolar()" id="polar-btn" class="text-xl">❤️</button>
                </div>
                <p id="polar-status" class="text-[7px] font-black text-gray-500 uppercase tracking-tighter">Polar Desconectada</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-start" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic">Iniciar</button>
            <button onclick="pausarEntreno()" id="btn-pause" class="bg-white/5 text-white p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Pausa</button>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4 italic">Tanita</p>
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="tan-p" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 text-white" placeholder="Peso">
                <input type="number" id="tan-g" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 text-white" placeholder="%G">
                <input type="number" id="tan-m" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 text-white" placeholder="Musc">
            </div>
            <button onclick="saveTanita()" class="w-full mt-4 bg-apple-green text-black py-4 rounded-xl font-black text-[10px] uppercase italic text-white">Actualizar</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black mb-2 border border-white/5">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-3 italic">Mis Discos (Físicos)</p>
            <div class="flex flex-col gap-3">
                <div class="flex gap-2 w-full text-white">
                    <input type="number" id="dw" class="flex-1 bg-[#1c1c1e] p-4 rounded-xl text-xs border border-white/10 text-white" placeholder="Kg">
                    <input type="number" id="dq" class="flex-1 bg-[#1c1c1e] p-4 rounded-xl text-xs border border-white/10 text-white" placeholder="Cant.">
                </div>
