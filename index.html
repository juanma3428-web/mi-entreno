<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APPLE COACH V29 - Feedback Activo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 3000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="feedback-modal" class="modal-overlay">
        <div class="apple-card w-full border-apple-green">
            <h2 class="text-lg font-black italic uppercase mb-2">Entreno Finalizado</h2>
            <p class="text-[10px] text-gray-400 uppercase font-bold mb-6 italic">¿Cómo ha sido la intensidad hoy?</p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="saveFeedback(0.8)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic hover:bg-apple-green hover:text-black">Muy Fácil (Subir intensidad)</button>
                <button onclick="saveFeedback(1.0)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic hover:bg-apple-green hover:text-black">Perfecto (Mantener)</button>
                <button onclick="saveFeedback(1.2)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic hover:bg-red-600">Demasiado Duro (Bajar un poco)</button>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p id="coach-info" class="text-[9px] text-gray-500 font-black uppercase italic tracking-widest">Feedback Adaptativo Activo</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleDrawer('drawer-tanita')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
            <button onclick="toggleDrawer('equip-drawer')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚙️</button>
        </div>
    </div>

    <div id="mision-container" class="space-y-3 mb-8"></div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-center mb-4 text-center">
            <div id="display" class="text-6xl timer-font italic">00:00</div>
            <div class="text-right">
                <span id="bpm-val" class="text-3xl font-bold text-red-500 tracking-tighter">--</span>
                <p class="text-[8px] font-black text-gray-500 uppercase">BPM</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-start" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic">Iniciar</button>
            <button onclick="pausarEntreno()" id="btn-pause" class="bg-white/5 text-white p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Pausa</button>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4 italic">Tanita</p>
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="tan-p" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5" placeholder="Peso">
                <input type="number" id="tan-g" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5" placeholder="%G">
                <input type="number" id="tan-m" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5" placeholder="Musc">
            </div>
            <button onclick="saveTanita()" class="w-full mt-4 bg-apple-green text-black py-4 rounded-xl font-black text-[10px] uppercase italic">Guardar</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-4 italic">Herramientas</p>
            <input type="text" id="tn" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2 border border-white/5" placeholder="Nombre">
            <div class="flex gap-2 mb-4">
                <select id="tt" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs text-gray-400">
                    <option value="fuerza">Fuerza</option>
                    <option value="calistenia">Calistenia</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="tw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs border border-white/5" placeholder="Peso Base">
            </div>
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic mb-4">Guardar</button>
            <div id="lista-herramientas" class="space-y-1"></div>
        </div>
    </div>

    <script>
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 35 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];
        // Nuevo: Factor de feedback (1.0 = neutral)
        let intensityFactor = parseFloat(localStorage.getItem('intensityFactor')) || 1.0; 
        
        let seg=0, crono=null, running=false, pausado=false;

        function toggleDrawer(id) { document.getElementById(id).classList.toggle('drawer-open'); }

        // --- MEJORA: MOTOR DINÁMICO CON FEEDBACK ---
        function calcularRepsFeedback(tool) {
            const racha = history.length;
            // Aplicamos el factor de intensidad guardado del último feedback
            let factor = intensityFactor; 

            if (tool.t === 'fuerza') {
                const ratio = tool.w / (bodyComp.musculo || 35);
                let repsBase = ratio > 1.2 ? 6 : 10;
                let final = Math.round(repsBase / factor); // Si factor > 1 (duro), bajan las reps
                return `${final}-${final+2} Reps`;
            }
            if (tool.t === 'calistenia') {
                let repsBase = 15 - racha;
                let final = Math.round(repsBase / factor);
                return `${final}-${final+3} Reps`;
            }
            if (tool.t === 'cardio') {
                let tiempoBase = bodyComp.grasa > 20 ? 40 : 25;
                return `${Math.round(tiempoBase / factor)} Min`;
            }
            return "12 Reps";
        }

        function generarMision() {
            const cont = document.getElementById('mision-container');
            cont.innerHTML = '';
            let pool = myTools.filter(t => t.active !== false);
            if (pool.length === 0) return;
            
            pool.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(t => {
                const color = t.t === 'calistenia' ? 'border-blue-500' : (t.t === 'cardio' ? 'border-orange-500' : 'border-apple-green');
                cont.innerHTML += `
                    <div class="apple-card border-l-4 ${color} py-6 flex justify-between items-center bg-white/[0.02]">
                        <div>
                            <h3 class="font-black text-sm uppercase italic">${t.n}</h3>
                            <p class="text-[8px] text-gray-500 font-bold uppercase mt-1">Config: ${t.t} | ${t.t==='fuerza' ? t.w+'kg' : 'Cuerpo'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[14px] font-black italic text-apple-green tracking-tighter">${calcularRepsFeedback(t)}</p>
                            <p class="text-[6px] text-gray-600 font-bold uppercase">Sugerido x Coach</p>
                        </div>
                    </div>`;
            });
        }

        // --- MEJORA: FINALIZAR CON FEEDBACK ---
        function toggleEntreno() {
            if(!running) {
                running = true; pausado = false;
                document.getElementById('btn-start').innerText = "FINALIZAR";
                document.getElementById('btn-start').classList.replace('bg-apple-green', 'bg-red-600');
                crono = setInterval(() => { if(!pausado) { seg++; updateDisp(); } }, 1000);
            } else {
                clearInterval(crono);
                // En lugar de recargar, mostramos el modal de feedback
                document.getElementById('feedback-modal').style.display = 'flex';
            }
        }

        function saveFeedback(factor) {
            // Guardamos el nuevo factor: <1 es más fácil (pide más), >1 es más difícil (pide menos)
            localStorage.setItem('intensityFactor', factor);
            history.push(new Date().toDateString());
            localStorage.setItem('trainingHistory', JSON.stringify(history));
            location.reload(); // Ahora sí, recarga para aplicar cambios al siguiente día
        }

        function pausarEntreno() {
            pausado = !pausado;
            document.getElementById('btn-pause').innerText = pausado ? "REANUDAR" : "PAUSA";
            document.getElementById('btn-pause').classList.toggle('bg-apple-green');
            document.getElementById('btn-pause').classList.toggle('text-black');
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        function addTool() {
            const n = document.getElementById('tn').value, t = document.getElementById('tt').value, w = document.getElementById('tw').value || 0;
            if(n) { myTools.push({id: Date.now(), n, t, w, active: true}); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); renderTools(); generarMision(); }
        }

        function renderTools() {
            const cont = document.getElementById('lista-herramientas'); cont.innerHTML = '';
            myTools.forEach(t => {
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl mb-1">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${t.active!==false?'checked':''} onchange="toggleStatus(${t.id})" class="accent-apple-green">
                            <span class="text-[10px] font-bold uppercase">${t.n}</span>
                        </div>
                        <button onclick="deleteTool(${t.id})" class="text-red-500 text-xs font-bold">✕</button>
                    </div>`;
            });
        }

        function toggleStatus(id) {
            const tool = myTools.find(t => t.id === id);
            tool.active = !tool.active;
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            generarMision();
        }

        function deleteTool(id) { myTools = myTools.filter(t => t.id !== id); localStorage.setItem('myToolsV29', JSON.stringify(myTools)); renderTools(); generarMision(); }

        function saveTanita() {
            bodyComp.peso = document.getElementById('tan-p').value;
            bodyComp.grasa = document.getElementById('tan-g').value;
            bodyComp.musculo = document.getElementById('tan-m').value;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            location.reload();
        }

        window.onload = () => { renderTools(); generarMision(); };
    </script>
</body>
</html>
