<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coach V29 - Stable Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .drawer-open { max-height: 2000px; padding-bottom: 20px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">APPLE COACH <span class="text-apple-green">V29</span></h1>
            <p id="coach-info" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest italic">Personal Trainer Activo</p>
        </div>
        <div class="flex gap-2">
            <button onclick="abrirLogros()" class="w-10 h-10 rounded-full bg-purple-500/10 border border-purple-500/20 flex items-center justify-center">🏆</button>
            <button onclick="document.getElementById('modal-tanita').classList.add('active')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
        </div>
    </div>

    <div id="mision-display" class="space-y-3">
        </div>

    <div class="apple-card border-l-4 border-red-600 mt-4">
        <div class="flex justify-between items-center mb-4">
            <div id="display" class="text-5xl timer-font italic">00:00</div>
            <div class="text-right">
                <span id="bpm-val" class="text-2xl font-bold tracking-tighter text-red-500">--</span>
                <p class="text-[8px] font-black text-gray-500 uppercase">BPM Live</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="btn-principal" onclick="toggleEntreno()" class="flex-[2] bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase italic">Iniciar Misión</button>
            <button onclick="document.getElementById('equip-drawer').classList.toggle('drawer-open')" class="flex-1 bg-white/5 text-gray-400 p-4 rounded-2xl text-[10px] font-black uppercase">Config</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer px-2">
        <div class="bg-[#1c1c1e] p-4 rounded-3xl border border-white/5 space-y-4">
            <input type="text" id="tool-n" class="w-full bg-black p-4 rounded-xl text-xs" placeholder="Nombre Ejercicio">
            <select id="tool-t" class="w-full bg-black p-4 rounded-xl text-xs text-gray-400">
                <option value="fuerza">Fuerza (Pesos)</option>
                <option value="calistenia">Calistenia (Cuerpo)</option>
            </select>
            <input type="number" id="tool-w" class="w-full bg-black p-4 rounded-xl text-xs" placeholder="Peso Base (kg)">
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-4 rounded-2xl font-black text-xs uppercase italic">Guardar en Memoria</button>
            <div id="lista-tools" class="pt-4 space-y-2"></div>
        </div>
    </div>

    <div id="modal-tanita" class="modal-overlay">
        <div class="w-full max-w-xs bg-[#1c1c1e] p-6 rounded-[32px] border border-white/10">
            <h3 class="text-center text-[10px] font-black text-apple-green uppercase mb-6 tracking-widest">Sincronizar Tanita</h3>
            <div class="space-y-3">
                <input type="number" id="t-peso" class="w-full bg-black p-4 rounded-2xl text-center text-sm" placeholder="Peso (kg)">
                <input type="number" id="t-grasa" class="w-full bg-black p-4 rounded-2xl text-center text-sm" placeholder="% Grasa">
                <input type="number" id="t-musc" class="w-full bg-black p-4 rounded-2xl text-center text-sm" placeholder="Músculo (kg)">
            </div>
            <button onclick="guardarTanita()" class="w-full bg-apple-green text-black py-4 rounded-2xl mt-6 font-black text-xs uppercase italic">Actualizar Coach</button>
            <button onclick="document.getElementById('modal-tanita').classList.remove('active')" class="w-full mt-2 text-[9px] font-bold text-gray-500 uppercase p-2">Cerrar</button>
        </div>
    </div>

    <script>
        // PERSISTENCIA DE DATOS
        let myTools = JSON.parse(localStorage.getItem('myToolsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 34 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];
        let seg=0, crono=null, running=false;

        function init() {
            renderMision();
            renderToolsList();
        }

        // EL CEREBRO: Decide qué mostrar respetando las mejoras
        function renderMision() {
            const container = document.getElementById('mision-display');
            const info = document.getElementById('coach-info');
            container.innerHTML = '';

            // 1. Verificación de Descanso
            if (history.length >= 4) {
                info.innerText = "Estado: Recuperación Necesaria";
                container.innerHTML = `
                    <div class="apple-card border-l-4 border-yellow-500 py-10 text-center">
                        <span class="text-4xl">🛌</span>
                        <h2 class="text-lg font-black italic uppercase text-yellow-500 mt-4">Día de Descanso</h2>
                        <p class="text-[10px] text-gray-500 mt-2 font-bold px-6">La evidencia científica sugiere 24h para supercompensar.</p>
                        <button onclick="resetRacha()" class="mt-6 text-[8px] font-black text-gray-700 underline uppercase">Reiniciar Ciclo</button>
                    </div>`;
                return;
            }

            // 2. Selección de Ejercicios (Calistenia vs Fuerza)
            info.innerText = "Coach: Misión del Día Lista";
            let pool = bodyComp.grasa > 21 ? myTools.filter(t => t.t === 'calistenia') : myTools.filter(t => t.t === 'fuerza');
            
            if (pool.length === 0) { pool = myTools; } // Fallback si no hay específicos

            pool.slice(0, 3).forEach(tool => {
                const color = tool.t === 'calistenia' ? 'border-blue-500' : 'border-apple-green';
                const desc = tool.t === 'calistenia' ? 'Peso Corporal' : `Carga: ${tool.w}kg`;
                container.innerHTML += `
                    <div class="apple-card border-l-2 ${color} py-6">
                        <h3 class="font-black text-xs uppercase italic">${tool.n}</h3>
                        <p class="text-[9px] text-gray-500 font-bold mt-1 uppercase">${desc} | 4 Series x 12 Reps</p>
                    </div>`;
            });
        }

        function toggleEntreno() {
            if(!running) {
                running = true;
                document.getElementById('btn-principal').innerText = "FINALIZAR SESIÓN";
                document.getElementById('btn-principal').classList.replace('bg-apple-green', 'bg-red-600');
                crono = setInterval(() => { seg++; updateDisp(); }, 1000);
            } else {
                clearInterval(crono);
                history.push(new Date().toDateString());
                localStorage.setItem('trainingHistory', JSON.stringify(history));
                location.reload();
            }
        }

        function updateDisp() {
            let m=Math.floor(seg/60), s=seg%60;
            document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }

        function guardarTanita() {
            bodyComp.peso = parseFloat(document.getElementById('t-peso').value) || bodyComp.peso;
            bodyComp.grasa = parseFloat(document.getElementById('t-grasa').value) || bodyComp.grasa;
            bodyComp.musculo = parseFloat(document.getElementById('t-musc').value) || bodyComp.musculo;
            localStorage.setItem('bodyComp', JSON.stringify(bodyComp));
            location.reload();
        }

        function addTool() {
            const n = document.getElementById('tool-n').value;
            const t = document.getElementById('tool-t').value;
            const w = parseFloat(document.getElementById('tool-w').value || 0);
            if(n) {
                myTools.push({id: Date.now(), n, t, w});
                localStorage.setItem('myToolsV29', JSON.stringify(myTools));
                location.reload();
            }
        }

        function renderToolsList() {
            const list = document.getElementById('lista-tools');
            list.innerHTML = '';
            myTools.forEach(t => {
                list.innerHTML += `<div class="flex justify-between items-center bg-black p-3 rounded-xl border border-white/5">
                    <span class="text-[10px] font-bold uppercase">${t.n}</span>
                    <button onclick="deleteTool(${t.id})" class="text-red-500 text-xs">✕</button>
                </div>`;
            });
        }

        function deleteTool(id) {
            myTools = myTools.filter(t => t.id !== id);
            localStorage.setItem('myToolsV29', JSON.stringify(myTools));
            renderToolsList();
        }

        function resetRacha() { localStorage.setItem('trainingHistory', '[]'); location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
