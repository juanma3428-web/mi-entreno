<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Entreno Pro - V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ring-card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .text-apple-blue { color: #0a84ff; }
        .text-apple-red { color: #ff3b30; }
        .apple-btn { border-radius: 14px; font-weight: 700; transition: all 0.2s; border: none; }
        .apple-btn:active { transform: scale(0.96); opacity: 0.9; }
        
        /* Animación de alerta de zona cardíaca */
        @keyframes zone-alert { 0%, 100% { background: #1c1c1e; } 50% { background: #450a0a; } }
        .out-of-zone { animation: zone-alert 1.5s infinite; border: 1px solid #ff3b30; }
        
        #feedback-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="feedback-modal" class="hidden">
        <div class="ring-card w-full max-w-sm text-center border border-white/10">
            <h2 class="text-2xl font-bold mb-2 text-apple-green">¡Buen trabajo!</h2>
            <p class="text-sm text-gray-400 mb-8 text-balance">¿Cómo calificarías el esfuerzo de esta sesión?</p>
            <div class="space-y-3">
                <button onclick="cerrarFeedback('suave')" class="w-full apple-btn bg-white/5 text-apple-blue py-5 uppercase text-xs tracking-widest">Suave (Subir carga)</button>
                <button onclick="cerrarFeedback('perfecto')" class="w-full apple-btn bg-white/5 text-apple-green py-5 uppercase text-xs tracking-widest">Perfecto</button>
                <button onclick="cerrarFeedback('duro')" class="w-full apple-btn bg-white/5 text-apple-red py-5 uppercase text-xs tracking-widest">Muy duro (Ajustar)</button>
            </div>
        </div>
    </div>

    <div id="bio-panel" class="ring-card border-l-4 border-apple-red transition-all duration-700">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[11px] font-bold text-gray-500 uppercase tracking-tight">Frecuencia Cardíaca</p>
                <div class="flex items-baseline gap-1">
                    <span id="bpm-val" class="text-6xl font-bold tracking-tighter">--</span>
                    <span class="text-apple-red font-bold text-sm">BPM</span>
                </div>
            </div>
            <button onclick="conectarPolar()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl">❤️</button>
        </div>
        
        <div id="goal-box" class="mt-4 p-4 bg-white/5 rounded-2xl hidden">
            <div class="flex items-center gap-2 mb-1">
                <div class="w-2 h-2 bg-apple-blue rounded-full animate-pulse"></div>
                <p class="text-[10px] text-apple-blue font-black uppercase">Objetivo Actual</p>
            </div>
            <p id="goal-desc" class="text-lg font-bold tracking-tight">Selecciona un ejercicio...</p>
        </div>
    </div>

    <div class="ring-card text-center">
        <p id="timer-label" class="text-[10px] font-bold text-gray-500 uppercase mb-1 tracking-widest">Tiempo de Trabajo</p>
        <div id="timer-display" class="text-7xl font-light tracking-tighter mb-8 italic">00:00</div>
        
        <div class="flex gap-4">
            <button id="pause-btn" onclick="pausar()" class="w-16 h-16 rounded-full bg-yellow-500/10 flex items-center justify-center opacity-30" disabled>
                <span id="pause-icon" class="text-yellow-500 text-xl font-bold">||</span>
            </button>
            <button id="main-btn" onclick="toggleEntreno()" class="flex-1 apple-btn bg-apple-green text-black text-sm uppercase font-black tracking-widest italic">Iniciar</button>
        </div>
    </div>

    <div id="plan-section">
        <h2 class="text-[11px] font-bold text-gray-500 ml-2 mb-4 uppercase tracking-[0.2em]">Programación de Hoy</h2>
        <div id="exercises-list" class="space-y-3"></div>
    </div>

    <script>
        let seg = 0, crono, running = false, paused = false, targetBPM = 0;
        
        // Base de datos de ejercicios con la programación que pediste
        const ejercicios = [
            {id:1, n: "Rodillo de rulos", eq: "Rodillo de rulos", meta: "35 min a 135 BPM", bpm: 135, min: 35},
            {id:2, n: "Cinta de correr", eq: "Cinta de correr", meta: "12 min (Intensidad Máx)", bpm: 155, min: 12},
            {id:3, n: "Press de Banca", eq: "Multiestación", meta: "3 Series x 10 (90s desc.)", series: 3, desc: 90},
            {id:4, n: "Polea Alta", eq: "Multiestación", meta: "4 Series x 12 (60s desc.)", series: 4, desc: 60}
        ];

        function init() {
            renderPlan();
        }

        function renderPlan() {
            const list = document.getElementById('exercises-list');
            list.innerHTML = '';
            ejercicios.forEach((ex, i) => {
                list.innerHTML += `
                    <div onclick="fijarMeta(${i})" class="ring-card border-l-2 border-apple-blue active:scale-95 transition-transform">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-lg leading-tight">${ex.n}</h3>
                                <p class="text-xs text-apple-blue font-bold uppercase tracking-tight mt-1">${ex.meta}</p>
                            </div>
                            <button class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-black text-white/60">FIJAR</button>
                        </div>
                    </div>`;
            });
        }

        function fijarMeta(idx) {
            const ex = ejercicios[idx];
            targetBPM = ex.bpm || 0;
            document.getElementById('goal-box').classList.remove('hidden');
            document.getElementById('goal-desc').innerText = ex.meta;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleEntreno() {
            const btn = document.getElementById('main-btn');
            const pBtn = document.getElementById('pause-btn');
            if (!running) {
                running = true; 
                btn.innerText = "Finalizar"; 
                btn.className = "flex-1 apple-btn bg-red-600 text-white text-sm uppercase font-black tracking-widest italic";
                pBtn.disabled = false; pBtn.classList.remove('opacity-30');
                document.getElementById('timer-label').innerText = "Entrenando";
                crono = setInterval(() => { seg++; updateDisplay(); }, 1000);
            } else {
                finalizarSesion();
            }
        }

        function updateDisplay() {
            let m = Math.floor(seg / 60), s = seg % 60;
            document.getElementById('timer-display').innerText = `${m}:${s.toString().padStart(2, '0')}`;
        }

        function pausar() {
            const icon = document.getElementById('pause-icon');
            if (!paused) { 
                paused = true; clearInterval(crono); icon.innerText = "▶"; 
                document.getElementById('timer-label').innerText = "En Pausa";
            } else { 
                paused = false; icon.innerText = "||"; 
                document.getElementById('timer-label').innerText = "Entrenando";
                crono = setInterval(() => { seg++; updateDisplay(); }, 1000); 
            }
        }

        function finalizarSesion() {
            clearInterval(crono);
            document.getElementById('feedback-modal').classList.replace('hidden', 'flex');
        }

        function cerrarFeedback(nivel) {
            document.getElementById('feedback-modal').classList.replace('flex', 'hidden');
            seg = 0; running = false; updateDisplay();
            const btn = document.getElementById('main-btn');
            btn.innerText = "Iniciar";
            btn.className = "flex-1 apple-btn bg-apple-green text-black text-sm uppercase font-black tracking-widest italic";
            document.getElementById('pause-btn').disabled = true; document.getElementById('pause-btn').classList.add('opacity-30');
            document.getElementById('goal-box').classList.add('hidden');
            alert("Feedback guardado. Entrenador actualizado.");
        }

        async function conectarPolar() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');
                char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value.getUint8(1);
                    const bpmEl = document.getElementById('bpm-val');
                    const panel = document.getElementById('bio-panel');
                    bpmEl.innerText = val;
                    
                    // Lógica de Alerta de Zona Cardíaca
                    if(targetBPM > 0 && Math.abs(val - targetBPM) > 10) {
                        panel.classList.add('out-of-zone');
                    } else {
                        panel.classList.remove('out-of-zone');
                    }
                });
            } catch (err) { console.log(err); }
        }

        init();
    </script>
</body>
</html>
