<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APPLE COACH V30 - Fix Manual Delete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .apple-card { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid #2c2c2e; width: 100%; box-sizing: border-box; }
        .text-apple-green { color: #30d158; }
        .bg-apple-green { background-color: #30d158; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .drawer-open { max-height: 3000px; padding-bottom: 20px; }
        .timer-font { font-variant-numeric: tabular-nums; font-weight: 200; letter-spacing: -2px; }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #mision-container { min-height: 50px; display: block !important; opacity: 1 !important; }
        .input-ajustado { width: 100% !important; box-sizing: border-box !important; }
        .btn-delete-util { padding: 10px; margin: -10px; font-size: 16px; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; }
    </style>
</head>
<body class="p-4 pb-32 text-white">

    <div id="feedback-modal" class="modal-overlay">
        <div class="apple-card w-full border-apple-green">
            <h2 class="text-lg font-black italic uppercase mb-2 text-apple-green">Sesión Completada</h2>
            <p id="resumen-sesion" class="text-[10px] text-gray-400 uppercase font-bold mb-6 italic"></p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="saveFeedback(0.8)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic text-white">Muy Ligero</button>
                <button onclick="saveFeedback(1.0)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic text-apple-green">Intensidad Óptima</button>
                <button onclick="saveFeedback(1.3)" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase italic text-white">Demasiado Duro</button>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">APPLE COACH <span class="text-apple-green">V30</span></h1>
            <p class="text-[8px] text-gray-500 font-black uppercase tracking-widest italic">Inteligencia BM 450 + Polar H10</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleDrawer('drawer-tanita')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚖️</button>
            <button onclick="toggleDrawer('equip-drawer')" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">⚙️</button>
        </div>
    </div>

    <div id="mision-container" class="space-y-3 mb-8"></div>

    <div class="apple-card border-l-4 border-red-600">
        <div class="flex justify-between items-start mb-4">
            <div>
                <div id="display" class="text-6xl timer-font italic">00:00</div>
                <div class="flex items-center gap-2 mt-1">
                    <span id="kcal-val" class="text-lg font-bold text-orange-500 tracking-tighter">0</span>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Kcal Est.</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span id="bpm-val" class="text-4xl font-bold text-red-500 tracking-tighter">--</span>
                    <button onclick="connectPolar()" id="polar-btn" class="text-xl">❤️</button>
                </div>
                <p id="polar-status" class="text-[7px] font-black text-gray-500 uppercase tracking-tighter">Polar Desconectada</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleEntreno()" id="btn-start" class="bg-apple-green text-black p-4 rounded-2xl text-[10px] font-black uppercase flex-[2] italic">Iniciar</button>
            <button onclick="pausarEntreno()" id="btn-pause" class="bg-white/5 text-white p-4 rounded-2xl text-[10px] font-black uppercase flex-1 border border-white/5">Pausa</button>
        </div>
    </div>

    <div id="drawer-tanita" class="drawer">
        <div class="apple-card bg-black border-apple-green/30">
            <p class="text-[9px] font-black text-apple-green uppercase mb-4 italic">Tanita</p>
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="tan-p" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 text-white" placeholder="Peso">
                <input type="number" id="tan-g" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 text-white" placeholder="%G">
                <input type="number" id="tan-m" class="bg-[#1c1c1e] p-3 rounded-xl text-xs text-center border border-white/5 text-white" placeholder="Musc">
            </div>
            <button onclick="saveTanita()" class="w-full mt-4 bg-apple-green text-black py-4 rounded-xl font-black text-[10px] uppercase italic">Actualizar</button>
        </div>
    </div>

    <div id="equip-drawer" class="drawer">
        <div class="apple-card bg-black mb-2 border border-white/5">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-3 italic">Mis Discos (Físicos)</p>
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <input type="number" id="dw" class="flex-1 bg-[#1c1c1e] p-4 rounded-xl text-xs border border-white/10 input-ajustado text-white" placeholder="Kg">
                    <input type="number" id="dq" class="flex-1 bg-[#1c1c1e] p-4 rounded-xl text-xs border border-white/10 input-ajustado text-white" placeholder="Cant.">
                </div>
                <button onclick="addDisc()" class="w-full bg-white/10 text-white p-3 rounded-xl text-[10px] font-black uppercase italic border border-white/5">Añadir al Inventario</button>
            </div>
            <div id="lista-discos" class="flex flex-wrap gap-2 mt-4 text-white"></div>
        </div>

        <div class="apple-card bg-black">
            <p class="text-[9px] font-black text-gray-400 uppercase mb-4 italic">Herramientas Personalizadas</p>
            <input type="text" id="tn" class="w-full bg-[#1c1c1e] p-3 rounded-xl text-xs mb-2 border border-white/5 text-white" placeholder="Nombre">
            <div class="flex gap-2 mb-4">
                <select id="tt" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs text-gray-400">
                    <option value="fuerza">Fuerza</option>
                    <option value="calistenia">Calistenia</option>
                    <option value="cardio">Cardio</option>
                </select>
                <input type="number" id="tw" class="flex-1 bg-[#1c1c1e] p-3 rounded-xl text-xs border border-white/5 text-white" placeholder="Peso Sug.">
            </div>
            <button onclick="addTool()" class="w-full bg-apple-green text-black py-3 rounded-xl font-black text-xs uppercase italic mb-4">Guardar</button>
            <div id="lista-herramientas" class="space-y-1"></div>
        </div>
    </div>

    <script>
        const EJERCICIOS_MAESTROS = [
            { id: 'm1', n: 'Polea Alta (Espalda)', t: 'bm450', w: 15 },
            { id: 'm2', n: 'Press Pecho Sentado', t: 'bm450', w: 20 },
            { id: 'm3', n: 'Extension Cuadriceps', t: 'bm450', w: 10 },
            { id: 'm4', n: 'Contractor Pecho (Aperturas)', t: 'bm450', w: 10 },
            { id: 'm5', n: 'Biceps Polea Baja', t: 'bm450', w: 5 },
            { id: 'c1', n: 'Flexiones Diamante', t: 'calistenia', w: 0 },
            { id: 'c2', n: 'Plancha Abdominal', t: 'calistenia', w: 0 },
            { id: 'c3', n: 'Zancadas Dinámicas', t: 'calistenia', w: 0 },
            { id: 'c4', n: 'Sentadilla Búlgara', t: 'calistenia', w: 0 }
        ];

        let myTools = JSON.parse(localStorage.getItem('myToolsV30')) || EJERCICIOS_MAESTROS;
        let myDiscs = JSON.parse(localStorage.getItem('myDiscsV29')) || [];
        let bodyComp = JSON.parse(localStorage.getItem('bodyComp')) || { peso: 75, grasa: 20, musculo: 35 };
        let history = JSON.parse(localStorage.getItem('trainingHistory')) || [];
        let intensityFactor = parseFloat(localStorage.getItem('intensityFactor')) || 1.0;
        
        let seg=0, crono=null, running=false, pausado=false;
        let bluetoothDevice, heartRateCharacteristic, currentBPM = 0, totalKcal = 0;

        async function connectPolar() {
            try {
                document.getElementById('polar-status').innerText = "Buscando...";
                bluetoothDevice = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                heartRateCharacteristic = await service.getCharacteristic('heart_rate_measurement');
                await heartRateCharacteristic.startNotifications();
                heartRateCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    currentBPM = e.target.value.getUint8(1);
                    document.getElementById('bpm-val').innerText = currentBPM;
                });
                document.getElementById('polar-status').innerText = "H10 Conectada";
            } catch (error) { document.getElementById('polar-status').innerText = "Error"; }
        }

        function toggleDrawer(id) { document.getElementById(id).classList.toggle('drawer-open'); }

        function renderTools() {
            const cont = document.getElementById('lista-herramientas');
            cont.innerHTML = '';
            myTools.forEach((t) => {
                const uniqueId = t.id ? t.id.toString() : Math.random().toString(36).substr(2, 9);
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl mb-1 border border-white/5">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${t.active!==false?'checked':''} onchange="toggleStatus('${uniqueId}')" class="accent-apple-green w-4 h-4">
                            <span class="text-[10px] font-bold uppercase italic text-white">${t.n}</span>
                        </div>
                        <button onclick="deleteTool('${uniqueId}')" class="text-red-500 font-bold btn-delete-util">✕</button>
                    </div>`;
            });
        }

        function deleteTool(id) {
            myTools = myTools.filter(t => (t.id ? t.id.toString() : '') !== id.toString());
            localStorage.setItem('myToolsV30', JSON.stringify(myTools));
            renderTools();
            generarMision();
        }

        function addTool() {
            const n = document.getElementById('tn').value, t = document.getElementById('tt').value, w = document.getElementById('tw').value || 0;
            if(n) {
                myTools.push({id: Date.now().toString(), n, t, w: parseFloat(w), active: true});
                localStorage.setItem('myToolsV30', JSON.stringify(myTools));
                document.getElementById('tn').value = '';
                renderTools();
                generarMision();
            }
        }

        function toggleStatus(id) {
            const tool = myTools.find(t => (t.id ? t.id.toString() : '') === id.toString());
            if(tool) tool.active = !tool.active;
            localStorage.setItem('myToolsV30', JSON.stringify(myTools));
            generarMision();
        }

        function renderDiscs() {
            const cont = document.getElementById('lista-discos');
            cont.innerHTML = '';
            myDiscs.forEach((d, index) => { 
                cont.innerHTML += `<div class="bg-white/5 border border-white/10 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex gap-2 items-center italic text-white">${d.q}x ${d.w}kg <button onclick="removeDisc(${index})" class="text-red-500 font-bold ml-1 px-1">✕</button></div>`; 
            });
        }

        function removeDisc(index) { myDiscs.splice(index, 1); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); renderDiscs(); generarMision(); }
        function addDisc() { const wVal = parseFloat(document.getElementById('dw').value), qVal = parseInt(document.getElementById('dq').value); if(!isNaN(wVal) && !isNaN(qVal)) { myDiscs.push({w: wVal, q: qVal}); localStorage.setItem('myDiscsV29', JSON.stringify(myDiscs)); document.getElementById('dw').value = ''; document.getElementById('dq').value = ''; renderDiscs(); generarMision(); } }
        function saveTanita() { bodyComp.peso = document.getElementById('tan-p').value; bodyComp.grasa = document.getElementById('tan-g').value; bodyComp.musculo = document.getElementById('tan-m').value; localStorage.setItem('bodyComp', JSON.stringify(bodyComp)); location.reload(); }
        function toggleEntreno() { if(!running) { running = true; crono = setInterval(() => { seg++; updateDisp(); }, 1000); document.getElementById('btn-start').innerText = "FINALIZAR"; } else { location.reload(); } }
        function updateDisp() { let m=Math.floor(seg/60), s=seg%60; document.getElementById('display').innerText = `${m}:${s.toString().padStart(2,'0')}`; }
        function generarMision() { /* Mantiene lógica de V30 */ }

        window.onload = () => { renderDiscs(); renderTools(); };
    </script>
</body>
</html>
